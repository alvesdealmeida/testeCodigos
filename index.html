<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Binário: Missão Programação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --accent-color: #00ff66;
            --panel-bg: rgba(31, 41, 55, 0.7);
            --text-main: #f3f4f6;
        }

        /* RESTRIÇÃO DESKTOP */
        #aviso-mobile-apenas {
            display: none;
            position: fixed;
            inset: 0;
            background: #0b0f19;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        @media screen and (min-width: 1025px) {
            #aviso-mobile-apenas { display: flex; }
            #app-container { display: none; }
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            text-align: center;
            overflow-x: hidden;
            touch-action: manipulation;
            transition: background-color 0.5s ease;
        }

        .screen { display: none; padding: 10px; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; align-items: center; }

        .menu-card {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 25px 15px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 400px;
            margin-top: 20vh;
        }

        h1 { font-size: 1.8rem; margin: 10px 0; color: var(--accent-color); }

        .mapa-fases { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }

        .fase-btn {
            width: 70px; height: 70px; border-radius: 14px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1);
            color: #4b5563; font-weight: bold;
        }
        .fase-btn span { font-size: 0.6rem; text-transform: uppercase; }
        .fase-btn.liberada { border-color: var(--accent-color); color: var(--accent-color); }

        .btn-upload {
            display: inline-flex; padding: 6px 12px;
            background: rgba(0, 188, 255, 0.1); border: 1px solid #00bcff;
            color: #00bcff; border-radius: 6px; font-size: 0.75rem; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }

        /* AJUSTE DOS BOTÕES PARA CIMA */
        .split-container { display: flex; width: 100%; flex-direction: column; align-items: center; gap: 5px; }
        .pane { padding: 5px; width: 100%; display: flex; flex-direction: column; align-items: center; }

        .binary-list { 
            font-family: 'Courier New', monospace; 
            color: var(--accent-color); 
            font-size: 1rem; 
            letter-spacing: 4px; 
            line-height: 1.2;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
        }

        .grid { display: grid; gap: 3px; background: rgba(255, 255, 255, 0.05); padding: 5px; border-radius: 8px; }
        .cell { width: 30px; height: 30px; background: rgba(255,255,255,0.1); border-radius: 4px; }
        .cell.active { background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); }
        .cell.correct { background: #10b981 !important; }
        .cell.wrong { background: #ef4444 !important; }

        .controls { 
            margin-top: 15px; 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            width: 100%;
            padding-bottom: 30px;
        }
        .action-btn { 
            flex: 1;
            max-width: 140px;
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 0.9rem; 
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="aviso-mobile-apenas">
    <h1>📱 Mobile Only</h1>
    <p>Este sistema é exclusivo para dispositivos móveis.</p>
</div>

<div id="app-container">
    <div id="telaMenu" class="screen active">
        <div class="menu-card">
            <h1>Pixel Binário</h1>
            <div class="mapa-fases">
                <div id="fase1" class="fase-btn" onclick="jogarNivel(0)">1<span>Fácil</span></div>
                <div id="fase2" class="fase-btn" onclick="jogarNivel(1)">2<span>Médio</span></div>
                <div id="fase3" class="fase-btn" onclick="jogarNivel(2)">3<span>Difícil</span></div>
            </div>
            <label for="fileInput" class="btn-upload">📁 MODO LIVRE</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <div id="jogoTela" class="screen">
        <div style="width: 100%; display: flex; justify-content: space-between; padding: 10px; box-sizing: border-box;">
            <button onclick="irParaHome()" style="background:rgba(255,255,255,0.1); border:1px solid #4b5563; color:#fff; border-radius:5px; padding:5px 12px;">⬅ Sair</button>
            <div id="statusFase" style="font-weight: bold;">Fase</div>
        </div>
        
        <div class="split-container">
            <div class="pane"><div id="binaryDisplay" class="binary-list"></div></div>
            <div class="pane"><div id="gridDisplay" class="grid"></div></div>
        </div>

        <div class="controls">
            <button class="action-btn" style="background:#10b981" onclick="validar()">COMPILAR</button>
            <button class="action-btn" style="background:#3b82f6" onclick="limpar()">LIMPAR</button>
        </div>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const helperCanvas = document.getElementById('helperCanvas');
    const ctx = helperCanvas.getContext('2d');
    let mapaBinario = [];
    let progresso = parseInt(localStorage.getItem('progressoBinario')) || 0;

    // Cores para variação dinâmica
    const temas = [
        { bg: "#0f172a", accent: "#38bdf8" }, // Azul
        { bg: "#161b22", accent: "#00ff66" }, // Verde Matrix
        { bg: "#1e1b4b", accent: "#a855f7" }, // Roxo
        { bg: "#2d0a0a", accent: "#f87171" }, // Vermelho
        { bg: "#111827", accent: "#fbbf24" }  // Âmbar
    ];

    const bancosDeDados = [
        { tarefas: [["0110", "1001", "1001", "0110"], ["1111", "1001", "1001", "1111"], ["010", "111", "010"]] },
        { tarefas: [["011110", "100001", "101101", "100001", "101101", "011110"], ["001100", "011110", "111111", "111111", "011110", "001100"]] },
        { tarefas: [["00011000", "00111100", "01111110", "11011011", "11111111", "00100100", "01011010", "10100101"]] }
    ];

    function mudarTema() {
        const tema = temas[Math.floor(Math.random() * temas.length)];
        document.documentElement.style.setProperty('--bg-color', tema.bg);
        document.documentElement.style.setProperty('--accent-color', tema.accent);
    }

    function jogarNivel(idx) {
        if (idx > progresso) return alert("Complete os níveis anteriores!");
        mudarTema();
        const tarefasNivel = bancosDeDados[idx].tarefas;
        mapaBinario = tarefasNivel[Math.floor(Math.random() * tarefasNivel.length)];
        document.getElementById('statusFase').textContent = `Nível ${idx + 1}`;
        montarJogo(mapaBinario[0].length);
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        mudarTema();
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const size = 10;
                helperCanvas.width = size; helperCanvas.height = size;
                ctx.drawImage(img, 0, 0, size, size);
                const data = ctx.getImageData(0, 0, size, size).data;
                mapaBinario = [];
                for (let y = 0; y < size; y++) {
                    let linha = "";
                    for (let x = 0; x < size; x++) {
                        const i = (y * size + x) * 4;
                        const lum = (data[i] + data[i+1] + data[i+2]) / 3;
                        linha += (lum < 128 && data[i+3] > 50) ? "1" : "0";
                    }
                    mapaBinario.push(linha);
                }
                document.getElementById('statusFase').textContent = "MODO LIVRE";
                montarJogo(size);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function montarJogo(colunas) {
        document.getElementById('telaMenu').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');
        document.getElementById('binaryDisplay').innerHTML = mapaBinario.join('<br>');
        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
        
        mapaBinario.forEach(linha => {
            [...linha].forEach(bit => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.bit = bit;
                cell.onclick = () => cell.classList.toggle('active');
                grid.appendChild(cell);
            });
        });
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains('active');
            if (is1 && active) c.classList.add('correct');
            else if (!is1 && active) { c.classList.add('wrong'); erro = true; }
            else if (is1 && !active) erro = true;
        });

        if (!erro) {
            alert("🎉 SUCESSO!");
            progresso = Math.min(progresso + 1, 2);
            localStorage.setItem('progressoBinario', progresso);
            irParaHome();
        } else {
            alert("❌ ERRO NA COMPILAÇÃO!");
        }
    }

    function irParaHome() {
        document.getElementById('jogoTela').classList.remove('active');
        document.getElementById('telaMenu').classList.add('active');
        atualizarBotoes();
    }

    function limpar() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active', 'correct', 'wrong'));
    }

    function atualizarBotoes() {
        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`fase${i+1}`);
            btn.className = `fase-btn ${i <= progresso ? 'liberada' : 'bloqueada'}`;
        }
    }

    atualizarBotoes();
</script>
</body>
</html>
