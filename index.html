<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Pro - Mobile Academic</title>
    <style>
        :root { 
            --navy: #0f172a; --slate: #64748b; --emerald: #10b981; 
            --bg: #f1f5f9; --accent: #2563eb; --danger: #dc2626; --gold: #d97706; 
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: var(--bg); color: var(--navy); 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header Compacto para Mobile */
        header { 
            background: var(--navy); color: white; padding: 12px; 
            display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
        }
        
        .btn-quit {
            background: #ef444422; border: 1px solid var(--danger);
            color: #fca5a5; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.7rem;
        }

        #stats-bar { 
            display: flex; justify-content: space-around; background: white; 
            padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 0.85rem; font-weight: bold;
        }

        /* Área de Jogo Otimizada */
        #game-viewport { 
            flex-grow: 1; position: relative; width: 100%; 
            background: #ffffff; overflow: hidden;
        }

        .problem-node { 
            position: absolute; width: 110px; padding: 10px; background: white; 
            border: 2px solid var(--navy); border-radius: 8px; text-align: center;
            font-size: 0.9rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        /* Display de Resposta */
        #answer-display { 
            height: 60px; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 300; background: #e2e8f0; color: var(--navy);
            border-top: 2px solid var(--slate);
        }

        /* Numpad Ergonômico para Celular */
        #numpad { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            width: 100%; background: #cbd5e1; gap: 1px;
        }
        .key { 
            background: white; border: none; padding: 20px; 
            font-size: 1.6rem; color: var(--navy); font-weight: 600;
        }
        .key:active { background: #cbd5e1; transform: scale(0.98); }
        .key-spec { background: #f8fafc; color: var(--slate); }

        /* Overlays */
        .full-overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .card { 
            background: white; border-radius: 16px; padding: 30px; width: 100%; 
            max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        .btn-main {
            width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #e2e8f0;
            border-radius: 10px; background: white; font-weight: 700; font-size: 1rem;
            text-align: left; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

    <!-- Tela Inicial -->
    <div id="start-screen" class="full-overlay">
        <div class="card">
            <h2 style="margin:0 0 20px 0; text-align:center; color:var(--navy)">EXAME AVANÇADO</h2>
            <button class="btn-main" onclick="init('arithmetic')"><span>🔢 Cálculo Avançado</span> ❯</button>
            <button class="btn-main" onclick="init('algebra')"><span>x² Álgebra Linear</span> ❯</button>
            <button class="btn-main" onclick="init('geometry')"><span>📐 Geometria Analítica</span> ❯</button>
            <button class="btn-main" onclick="init('all')" style="background:var(--navy); color:white"><span>🎓 Exame Completo</span> ❯</button>
        </div>
    </div>

    <!-- Tela de Fim -->
    <div id="end-screen" class="full-overlay" style="display:none">
        <div class="card" id="result-card">
            <!-- Gerado via JS -->
        </div>
    </div>

    <header>
        <button class="btn-quit" onclick="location.reload()">Sair</button>
        <div id="timer-display">00:00</div>
        <div id="ui-level">NÍVEL 1</div>
    </header>
   
    <div id="stats-bar">
        <span>PONTOS: <span id="ui-score" style="color:var(--accent)">0</span></span>
        <span>ERROS: <span id="ui-errors" style="color:var(--danger)">0</span>/5</span>
    </div>

    <div id="game-viewport"></div>

    <div id="answer-display">_</div>

    <div id="numpad">
        <button class="key" onclick="tap(1)">1</button><button class="key" onclick="tap(2)">2</button><button class="key" onclick="tap(3)">3</button>
        <button class="key" onclick="tap(4)">4</button><button class="key" onclick="tap(5)">5</button><button class="key" onclick="tap(6)">6</button>
        <button class="key" onclick="tap(7)">7</button><button class="key" onclick="tap(8)">8</button><button class="key" onclick="tap(9)">9</button>
        <button class="key key-spec" onclick="tap('C')">C</button>
        <button class="key" onclick="tap(0)">0</button>
        <button class="key key-spec" onclick="tap('.')">.</button>
    </div>
    
    <script>
        const viewport = document.getElementById('game-viewport');
        const display = document.getElementById('answer-display');
        let mode = 'all', score = 0, errors = 0, level = 1, speed = 0.7;
        let nodes = [], currentInput = "", isLive = false, startTime = 0;
        
        const mathEngine = {
            arithmetic: () => {
                const a = r(20, 100), b = r(15, 60);
                const op = Math.random() > 0.5 ? '+' : '-';
                return { q: `${a} ${op} ${b}`, a: op === '+' ? a + b : a - b };
            },
            algebra: () => {
                const x = r(3, 12), c = r(2, 5);
                const res = x * x + c;
                return { q: `x² + ${c} = ${res}<br>x > 0`, a: x };
            },
            geometry: () => {
                const base = r(5, 15), alt = r(4, 10);
                return { q: `Área Triâng.<br>b:${base} h:${alt}`, a: (base * alt) / 2 };
            }
        };

        function init(m) {
            mode = m;
            document.getElementById('start-screen').style.display = 'none';
            isLive = true; startTime = Date.now();
            spawn(); loop();
        }

        function tap(v) {
            if(!isLive) return;
            if(v === 'C') currentInput = "";
            else if(v === '.') { if(!currentInput.includes('.')) currentInput += '.'; }
            else if(currentInput.length < 6) currentInput += v;
            
            display.innerText = currentInput || "_";
            checkAnswer();
        }

        function checkAnswer() {
            const idx = nodes.findIndex(n => n.ans.toString() === currentInput);
            if(idx !== -1) {
                score += 50 * level;
                document.getElementById('ui-score').innerText = score;
                viewport.removeChild(nodes[idx].el);
                nodes.splice(idx, 1);
                currentInput = "";
                display.innerText = "_";
                display.style.color = "var(--emerald)";
                setTimeout(() => display.style.color = "var(--navy)", 300);
                
                if(score > level * 500) {
                    level++;
                    speed += 0.15;
                    document.getElementById('ui-level').innerText = `NÍVEL ${level}`;
                }
            }
        }

        function spawn() {
            if(!isLive) return;
            const keys = mode === 'all' ? Object.keys(mathEngine) : [mode];
            const type = keys[Math.floor(Math.random() * keys.length)];
            const prob = mathEngine[type]();
            
            const div = document.createElement('div');
            div.className = 'problem-node';
            div.innerHTML = prob.q;
            div.style.left = r(10, viewport.clientWidth - 120) + "px";
            div.style.top = "-80px";
            
            viewport.appendChild(div);
            nodes.push({ el: div, ans: prob.a, y: -80 });
            
            setTimeout(spawn, Math.max(1500, 4000 - (level * 300)));
        }

        function loop() {
            if(!isLive) return;
            for(let i = nodes.length - 1; i >= 0; i--) {
                nodes[i].y += speed;
                nodes[i].el.style.top = nodes[i].y + "px";
                
                if(nodes[i].y > viewport.clientHeight) {
                    errors++;
                    document.getElementById('ui-errors').innerText = errors;
                    viewport.removeChild(nodes[i].el);
                    nodes.splice(i, 1);
                    if(errors >= 5) end();
                }
            }
            requestAnimationFrame(loop);
        }

        function end() {
            isLive = false;
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('result-card').innerHTML = `
                <h2 style="text-align:center">EXAME CONCLUÍDO</h2>
                <p>Pontuação Final: <b>${score}</b></p>
                <p>Nível Atingido: <b>${level}</b></p>
                <button onclick="location.reload()" style="width:100%; padding:15px; background:var(--navy); color:white; border:none; border-radius:10px; font-weight:bold">RECOMEÇAR</button>
            `;
        }

        function r(min, max) { return Math.floor(Math.random() * (max - min + 1) + min); }
        
        setInterval(() => {
            if(isLive) {
                const s = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer-display').innerText = 
                    `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            }
        }, 1000);
    </script>
</body>
</html>
