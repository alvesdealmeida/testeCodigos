<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Araruama: Guardião da História</title>
    <style>
        :root { 
            --gold: #f4d03f; 
            --danger: #ff4757; 
            --deep-green: #1b4d3e; 
            --laguna-blue: #0077be;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* UI de Jogo */
        #ui { position: absolute; top: 10px; left: 10px; color: white; z-index: 10; pointer-events: none; }
        #stats { display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 12px; border: 2px solid var(--gold); }
        .label { color: var(--gold); font-size: 0.6rem; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 0.9rem; font-weight: bold; }

        /* Botão Sair/Desistir */
        #btn-desistir {
            position: absolute; bottom: 20px; right: 20px;
            width: 50px; height: 50px; background: rgba(0,0,0,0.7);
            border: 2px solid var(--danger); border-radius: 50%;
            color: var(--danger); font-size: 1.5rem; display: flex;
            align-items: center; justify-content: center; z-index: 50;
            cursor: pointer; transition: 0.3s;
        }
        #btn-desistir:hover { background: var(--danger); color: white; }

        /* Modais e Menus */
        .modal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            z-index: 100; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); color: #333; width: 90%; max-width: 420px; 
            border-radius: 25px; overflow: hidden; text-align: center; border: 4px solid var(--gold); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .card-header { background: var(--deep-green); color: white; padding: 15px; font-size: 1.1rem; font-weight: bold; }
        .card-body { padding: 25px; }

        /* Abas de Níveis */
        .tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; }
        .tab { padding: 8px 12px; background: #eee; border-radius: 8px; font-size: 0.7rem; font-weight: bold; cursor: pointer; border: 1px solid #ccc; }
        .tab.active { background: var(--gold); border-color: #b8860b; }

        .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .opt-btn { background: #f1f2f6; border: 2px solid #dfe4ea; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .opt-btn:hover { background: var(--gold); }

        .btn-main { 
            background: var(--deep-green); color: white; padding: 15px; border: none; 
            border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        #damage-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.4); display:none; pointer-events:none; z-index:5; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="damage-overlay"></div>
<div id="ui" style="display:none">
    <div id="stats">
        <div><span class="label">MÓDULO</span><span id="txt-lv" class="val">1 / 9</span></div>
        <div><span class="label">PROGRESSO</span><span id="txt-target" class="val">0 / 10</span></div>
        <div><span class="label">ZONA</span><span id="txt-loc" class="val">-</span></div>
    </div>
</div>

<div id="btn-desistir" style="display:none" onclick="desistir()">🚪</div>

<!-- Menu Inicial com Abas -->
<div id="modal" class="modal">
    <div class="card">
        <div class="card-header">ARARUAMA: GUARDIÃO DA HISTÓRIA</div>
        <div class="card-body">
            <div class="tabs">
                <div class="tab active" id="t1">MÓDULO 1</div>
                <div class="tab" id="t2">MÓDULO 2</div>
                <div class="tab" id="t3">MÓDULO 3</div>
            </div>
            <span style="font-size: 3rem;" id="m-icon">🏛️</span>
            <h3 id="m-title" style="margin: 10px 0;">Sambaquis e Origens</h3>
            <p id="m-text" style="font-size: 0.9rem; color: #555; margin-bottom: 20px;"></p>
            <button class="btn-main" onclick="startLevel()">Iniciar Jornada</button>
        </div>
    </div>
</div>

<!-- Modal Quiz -->
<div id="quiz-modal" class="modal" style="display:none">
    <div class="card">
        <div class="card-header">🧩 DESAFIO DE ARARUAMA</div>
        <div class="card-body">
            <p id="q-question" style="font-weight:bold;"></p>
            <div id="q-options" class="quiz-options"></div>
        </div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(f, t, d) {
        try {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
        } catch(e){}
    }

    let level = 0, score = 0, gameActive = false;
    let player = { x: 0, y: 0 }; let items = [];

    const campaign = [
        { title: "OS SAMBAQUIS", loc: "Centro", info: "Lugar de Conchas! Recupere os artefatos tupi-guarani na Praia do Hospício.", icon: "🐚", enemy: "🦀", bg: "#87CEEB", gr: "#f4d03f", q: "O que significa 'Araruama' em Tupi?", opts: ["Terra de Araras", "Lugar de conchas", "Rio Salgado"], ans: 1 },
        { title: "SÃO VICENTE RURAL", loc: "2º Distrito", info: "O coração agrícola! Proteja a produção de citros e gado das pragas.", icon: "🍊", enemy: "🐛", bg: "#2d5a27", gr: "#8b4513", q: "São Vicente de Paulo é famoso pela produção de:", opts: ["Sal", "Laranja e Limão", "Tecidos"], ans: 1 },
        { title: "A ESTRADA DE FERRO", loc: "São Vicente", info: "A antiga Ferrovia Maricá passava por aqui. Recupere o carvão perdido!", icon: "🚂", enemy: "⚠️", bg: "#4a4a4a", gr: "#333", q: "Como a produção de São Vicente chegava ao Rio antigamente?", opts: ["Caminhão", "Trem de Ferro", "Barco"], ans: 1 },
        { title: "LAGUNA HIPERSALINA", loc: "Laguna", info: "A maior do mundo! Colete o 'Ouro Branco' e evite a poluição.", icon: "🧂", enemy: "🗑️", bg: "#0077be", gr: "#fff", q: "A Laguna de Araruama é famosa mundialmente por ser:", opts: ["A mais funda", "A mais salgada", "A única de água doce"], ans: 1 },
        { title: "MOINHOS DE VENTO", loc: "Orla", info: "Patrimônio histórico! Mantenha as pás girando contra a ventania.", icon: "🌀", enemy: "⛈️", bg: "#3498db", gr: "#eee", q: "Para que serviam os moinhos na orla?", opts: ["Produzir energia", "Bombear água para o sal", "Decoração"], ans: 1 },
        { title: "PRAIA SECA", loc: "Restinga", info: "A 'Cancun Brasileira'. Salve os surfistas das correntes perigosas!", icon: "🏄", enemy: "🦈", bg: "#00bcd4", gr: "#ffeb3b", q: "Onde se localiza o distrito de Praia Seca?", opts: ["Na Serra", "Na Restinga entre lagoa e mar", "No Centro"], ans: 1 }
    ];

    function updateModal() {
        const c = campaign[level];
        document.getElementById('m-title').innerText = c.title;
        document.getElementById('m-icon').innerText = c.icon;
        document.getElementById('m-text').innerText = c.info;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('ui').style.display = 'none';
        document.getElementById('btn-desistir').style.display = 'none';
        
        // Atualiza Abas visuais
        for(let i=1; i<=3; i++) {
            document.getElementById('t'+i).className = (level >= (i-1)*2) ? 'tab active' : 'tab';
        }
    }

    function startLevel() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('btn-desistir').style.display = 'flex';
        score = 0; items = []; 
        for(let i=0; i<12; i++) spawn(true);
        gameActive = true; updateUI(); 
        if(!window.loopIniciado) { loop(); window.loopIniciado = true; }
    }

    function spawn(init = false) {
        const c = campaign[level];
        const isGood = Math.random() > 0.45;
        items.push({ 
            x: Math.random() * canvas.width, 
            y: init ? (Math.random() * -canvas.height) : -50, 
            isG: isGood, 
            s: (3 + level) + Math.random() * 2,
            swing: Math.random() * 0.05
        });
    }

    function updateUI() {
        const c = campaign[level];
        document.getElementById('txt-lv').innerText = `${level + 1} / ${campaign.length}`;
        document.getElementById('txt-target').innerText = `${score} / 10`;
        document.getElementById('txt-loc').innerText = c.loc;
    }

    function desistir() {
        if(confirm("Deseja interromper a missão e voltar ao menu?")) {
            gameActive = false;
            level = 0;
            updateModal();
        }
    }

    function triggerDamage() {
        const ov = document.getElementById('damage-overlay');
        ov.style.display = 'block';
        setTimeout(() => ov.style.display = 'none', 150);
    }

    function showQuiz() {
        gameActive = false; const c = campaign[level];
        document.getElementById('q-question').innerText = c.q;
        const div = document.getElementById('q-options'); div.innerHTML = "";
        c.opts.forEach((o, i) => {
            const b = document.createElement('button'); b.className = "opt-btn"; b.innerText = o;
            b.onclick = () => {
                document.getElementById('quiz-modal').style.display = 'none';
                if(i === c.ans) { 
                    playSound(800,'sine',0.3); level++; 
                    if(level < campaign.length) updateModal(); 
                    else { alert("VITÓRIA! Você se tornou o Guardião Supremo de Araruama!"); level = 0; updateModal(); }
                } else { 
                    playSound(100,'square',0.5); alert("ERRO! O passado foi alterado. Reiniciando zona."); 
                    score = 0; startLevel(); 
                }
            };
            div.appendChild(b);
        });
        document.getElementById('quiz-modal').style.display = 'flex';
    }

    function loop() {
        if(gameActive) {
            const c = campaign[level];
            // CENÁRIO DINÂMICO
            ctx.fillStyle = c.bg; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = c.gr; ctx.fillRect(0, canvas.height*0.85, canvas.width, canvas.height*0.15);
            
            // Jogador
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(player.x, player.y, 25, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = var(--gold); ctx.lineWidth = 4; ctx.stroke();
            
            items.forEach((it, i) => {
                it.y += it.s;
                it.x += Math.sin(it.y * it.swing) * 2;
                if(it.y > canvas.height) { items.splice(i,1); spawn(); }
                ctx.font = "35px Arial"; ctx.textAlign = "center";
                ctx.fillText(it.isG ? c.icon : c.enemy, it.x, it.y);
                
                if(Math.hypot(player.x-it.x, player.y-it.y) < 40) {
                    if(it.isG) { score++; playSound(600,'sine',0.1); }
                    else { score = Math.max(0, score - 2); playSound(150,'sawtooth',0.3); triggerDamage(); }
                    items.splice(i, 1); spawn(); updateUI();
                    if(score >= 10) showQuiz();
                }
            });
        }
        requestAnimationFrame(loop);
    }

    const mv = (e) => { 
        player.x = e.touches ? e.touches[0].clientX : e.clientX; 
        player.y = e.touches ? e.touches[0].clientY : e.clientY; 
        if(e.touches) e.preventDefault(); 
    };
    window.addEventListener('touchmove', mv, {passive:false});
    window.addEventListener('mousemove', mv);
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    player = { x: canvas.width/2, y: canvas.height/2 };
    updateModal();
</script>
</body>
</html>
