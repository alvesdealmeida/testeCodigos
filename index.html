<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Araruama: Guardião da História</title>
    <style>
        :root { --gold: #f4d03f; --danger: #ff4757; --deep-green: #1b4d3e; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        
        #ui { position: absolute; top: 10px; left: 10px; color: white; z-index: 10; pointer-events: none; display: none; }
        #stats { display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .label { color: var(--gold); font-size: 0.6rem; display: block; }
        .val { font-size: 0.8rem; font-weight: bold; }

        #btn-desistir {
            position: absolute; bottom: 20px; right: 20px; width: 50px; height: 50px; 
            background: rgba(0,0,0,0.8); border: 2px solid var(--danger); border-radius: 50%;
            color: var(--danger); font-size: 1.5rem; display: none; align-items: center; 
            justify-content: center; z-index: 100; cursor: pointer;
        }

        .modal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: #0f2027; z-index: 200; 
        }
        .card { background: white; width: 85%; max-width: 380px; border-radius: 20px; overflow: hidden; text-align: center; border: 3px solid var(--gold); }
        .card-header { background: var(--deep-green); color: white; padding: 12px; font-weight: bold; }
        .card-body { padding: 20px; }

        .tabs { display: flex; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .tab { padding: 8px; background: #eee; font-size: 0.65rem; cursor: pointer; border-radius: 5px; flex: 1; }
        .tab.active { background: var(--gold); font-weight: bold; }

        .btn-main { background: var(--deep-green); color: white; padding: 15px; border: none; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; }
        #damage-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.4); display:none; pointer-events:none; z-index:5; }
    </style>
</head>
<body>

<div id="damage-overlay"></div>
<div id="btn-desistir" onclick="desistir()">🚪</div>

<div id="ui">
    <div id="stats">
        <div><span class="label">LOCAL</span><span id="txt-loc" class="val">-</span></div>
        <div><span class="label">CONHECIMENTO</span><span id="txt-target" class="val">0 / 10</span></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="card">
        <div class="card-header">ARARUAMA: GUARDIÃO</div>
        <div class="card-body">
            <div class="tabs">
                <div class="tab active" onclick="mudarTab(0)">CENTRO</div>
                <div class="tab" onclick="mudarTab(1)">S. VICENTE</div>
                <div class="tab" onclick="mudarTab(2)">LAGUNA</div>
            </div>
            <span id="m-icon" style="font-size: 3rem;">🐚</span>
            <h3 id="m-title" style="margin: 10px 0;">Os Sambaquis</h3>
            <p id="m-text" style="font-size: 0.85rem; color: #666; margin-bottom: 20px;"></p>
            <button class="btn-main" onclick="startLevel()">INICIAR EXPEDIÇÃO</button>
        </div>
    </div>
</div>

<div id="quiz-modal" class="modal" style="display:none; background: rgba(0,0,0,0.9);">
    <div class="card">
        <div class="card-header">DESAFIO HISTÓRICO</div>
        <div class="card-body">
            <p id="q-question" style="font-weight:bold; margin-bottom: 15px;"></p>
            <div id="q-options" style="display:flex; flex-direction:column; gap:8px;"></div>
        </div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    let level = 0, score = 0, gameActive = false;
    let player = { x: 0, y: 0 }; 
    let items = [];

    const campaign = [
        { 
            title: "Os Sambaquis", loc: "Centro", 
            info: "Recupere as conchas tupi. Cuidado com os caranguejos da Praia do Hospício!", 
            icon: "🐚", enemy: "🦀", bg: "#87CEEB", gr: "#f4d03f", 
            q: "O que significa Araruama?", opts: ["Terra do Sol", "Lugar de Conchas", "Rio Salgado"], ans: 1 
        },
        { 
            title: "São Vicente Rural", loc: "2º Distrito", 
            info: "Colete as laranjas e limões da produção local. Fuja das lagartas!", 
            icon: "🍊", enemy: "🐛", bg: "#2d5a27", gr: "#8b4513", 
            q: "São Vicente é o coração...", opts: ["Comercial", "Industrial", "Agrícola"], ans: 2 
        },
        { 
            title: "Salina e Moinhos", loc: "Laguna", 
            info: "O Ciclo do Sal! Colete o 'Ouro Branco' e fuja das tempestades.", 
            icon: "🧂", enemy: "⛈️", bg: "#0077be", gr: "#fff", 
            q: "Qual a função histórica dos moinhos na orla?", opts: ["Fazer farinha", "Bombear água para o sal", "Gerar eletricidade"], ans: 1 
        }
    ];

    function mudarTab(idx) {
        level = idx;
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
        const c = campaign[level];
        document.getElementById('m-icon').innerText = c.icon;
        document.getElementById('m-title').innerText = c.title;
        document.getElementById('m-text').innerText = c.info;
    }

    function startLevel() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('btn-desistir').style.display = 'flex';
        score = 0; 
        items = []; 
        gameActive = true;
        updateUI();
        // Spawna os itens específicos do nível atual
        for(let i=0; i<8; i++) spawn(true);
    }

    function desistir() {
        gameActive = false;
        document.getElementById('ui').style.display = 'none';
        document.getElementById('btn-desistir').style.display = 'none';
        document.getElementById('modal').style.display = 'flex';
    }

    function spawn(init = false) {
        if (!gameActive && !init) return;
        const c = campaign[level]; // Pega os dados do nível selecionado
        items.push({ 
            x: Math.random() * (canvas.width - 40) + 20, 
            y: init ? (Math.random() * -canvas.height) : -50, 
            isG: Math.random() > 0.45, // 55% de chance de ser inimigo
            s: (3 + level) + Math.random() * 2,
            goodIcon: c.icon,   // Fixa o ícone bom do nível
            badIcon: c.enemy    // Fixa o ícone ruim do nível
        });
    }

    function updateUI() {
        const c = campaign[level];
        document.getElementById('txt-target').innerText = `${score} / 10`;
        document.getElementById('txt-loc').innerText = c.loc;
    }

    function showQuiz() {
        gameActive = false;
        const c = campaign[level];
        document.getElementById('q-question').innerText = c.q;
        const optsDiv = document.getElementById('q-options');
        optsDiv.innerHTML = "";
        c.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = "btn-main";
            b.style.padding = "10px";
            b.innerText = o;
            b.onclick = () => {
                if(i === c.ans) {
                    alert("Excelente! Você preservou a história.");
                    level = (level + 1) % campaign.length;
                    document.getElementById('quiz-modal').style.display = 'none';
                    desistir();
                } else {
                    alert("Algo deu errado na cronologia. Tente de novo.");
                    document.getElementById('quiz-modal').style.display = 'none';
                    startLevel();
                }
            };
            optsDiv.appendChild(b);
        });
        document.getElementById('quiz-modal').style.display = 'flex';
    }

    function loop() {
        if(gameActive) {
            const c = campaign[level];
            ctx.fillStyle = c.bg; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = c.gr; ctx.fillRect(0, canvas.height*0.85, canvas.width, canvas.height*0.15);
            
            // Desenha Jogador (Círculo Branco com Borda Dourada)
            ctx.fillStyle = "white"; ctx.beginPath(); 
            ctx.arc(player.x, player.y, 22, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "gold"; ctx.lineWidth = 3; ctx.stroke();

            // Processa Itens
            for(let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y += it.s;
                
                ctx.font = "32px Arial"; ctx.textAlign = "center";
                // Usa os ícones injetados pelo spawn para garantir sincronia
                ctx.fillText(it.isG ? it.goodIcon : it.badIcon, it.x, it.y);
                
                // Colisão
                const dist = Math.hypot(player.x - it.x, player.y - it.y);
                if(dist < 38) {
                    if(it.isG) {
                        score++;
                    } else { 
                        score = Math.max(0, score - 2); 
                        document.getElementById('damage-overlay').style.display='block'; 
                        setTimeout(()=>document.getElementById('damage-overlay').style.display='none', 100); 
                    }
                    items.splice(i, 1);
                    spawn();
                    updateUI();
                    if(score >= 10) showQuiz();
                } else if(it.y > canvas.height + 50) {
                    items.splice(i, 1);
                    spawn();
                }
            }
        }
        requestAnimationFrame(loop);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if(!gameActive) {
            player.x = canvas.width / 2;
            player.y = canvas.height * 0.7;
        }
    }

    const mover = (e) => {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        player.x = clientX;
        player.y = clientY;
    };

    window.addEventListener('mousemove', mover);
    window.addEventListener('touchmove', (e) => { mover(e); e.preventDefault(); }, {passive:false});
    window.addEventListener('resize', resize);
    
    resize();
    mudarTab(0);
    loop();
</script>
</body>
</html>
