<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Araruama: Guardião Elite</title>
    <style>
        :root { --gold: #f4d03f; --danger: #ff4757; --deep-green: #1b4d3e; --success: #2ecc71; --sand: #f5e6be; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; touch-action: none; }
        
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; color: white; z-index: 10; pointer-events: none; display: none; font-family: sans-serif; }
        #stats { display: flex; justify-content: space-between; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 12px; border: 2px solid var(--gold); }
        .label { color: var(--gold); font-size: 0.6rem; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 1.1rem; font-weight: bold; }
        .timer-low { color: var(--danger); animation: blink 0.5s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }

        #msg-overlay { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.5rem; font-weight: bold; display: none; z-index: 300;
            text-shadow: 3px 3px 0px #000; pointer-events: none; text-align: center; width: 90%;
        }

        #btn-desistir {
            position: absolute; bottom: 20px; right: 20px; width: 50px; height: 50px; 
            background: rgba(0,0,0,0.9); border: 2px solid var(--danger); border-radius: 50%;
            color: var(--danger); font-size: 1.5rem; display: none; align-items: center; 
            justify-content: center; z-index: 100; cursor: pointer;
        }

        .modal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: radial-gradient(circle, #2c5364, #203a43, #0f2027); z-index: 200; 
        }
        .card { 
            background: var(--sand); width: 88%; max-width: 420px; border-radius: 15px; 
            overflow: hidden; text-align: center; border: 5px double var(--deep-green);
        }
        .card-header { background: var(--deep-green); color: var(--gold); padding: 15px; }
        .card-body { padding: 20px; color: var(--deep-green); }

        .tabs { display: flex; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .tab { padding: 8px; background: rgba(0,0,0,0.1); font-size: 0.65rem; cursor: pointer; border-radius: 4px; flex: 1; font-weight: bold; }
        .tab.active { background: var(--deep-green); color: var(--gold); }

        .btn-main { 
            background: var(--deep-green); color: var(--gold); padding: 15px; border: none; 
            border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; 
            font-size: 1rem; text-transform: uppercase; box-shadow: 0 4px 0px #0d2a22;
        }
        
        #damage-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.5); display:none; pointer-events:none; z-index:5; }
    </style>
</head>
<body>

<div id="damage-overlay"></div>
<div id="msg-overlay"></div>
<div id="btn-desistir" onclick="desistir()">🚪</div>

<div id="ui">
    <div id="stats">
        <div><span class="label">MISSÃO</span><span id="txt-loc" class="val">-</span></div>
        <div><span class="label">TEMPO</span><span id="txt-time" class="val">30s</span></div>
        <div><span class="label">PONTOS</span><span id="txt-target" class="val">0 / 10</span></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="card">
        <div class="card-header"><h1>MODO GUARDIÃO</h1></div>
        <div class="card-body">
            <div class="tabs">
                <div id="t0" class="tab active" onclick="mudarTab(0)">CENTRO</div>
                <div id="t1" class="tab" onclick="mudarTab(1)">S. VICENTE</div>
                <div id="t2" class="tab" onclick="mudarTab(2)">LAGUNA</div>
            </div>
            <span id="m-icon" style="font-size: 4rem; display: block; margin-bottom: 10px;">🐚</span>
            <h2 id="m-title">Os Sambaquis</h2>
            <p id="m-text" style="font-size: 0.9rem; margin-bottom: 20px; min-height: 50px;"></p>
            <button class="btn-main" onclick="startLevel()">INICIAR DESAFIO</button>
        </div>
    </div>
</div>

<div id="quiz-modal" class="modal" style="display:none; background: rgba(0,0,0,0.95);">
    <div class="card">
        <div class="card-header"><h1>CONHECIMENTO É PODER</h1></div>
        <div class="card-body">
            <p id="q-question" style="font-weight:bold; font-size: 1.1rem; margin-bottom: 20px;"></p>
            <div id="q-options" style="display:flex; flex-direction:column; gap:12px;"></div>
        </div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let audioCtx, gameTimer;

    const districts = [
        { 
            title: "Os Sambaquis", loc: "Centro", icon: "🐚", enemy: "🦀", bg: "#87CEEB", gr: "#f4d03f",
            quizzes: [
                { q: "O que significa 'Araruama' em tupi?", opts: ["Terra do Sal", "Lugar de Conchas", "Rio Azul"], ans: 1 },
                { q: "Onde se localiza o museu arqueológico?", opts: ["Praia Seca", "Mataruna", "Centro (Sambaqui)"], ans: 2 },
                { q: "Os Sambaquis eram formados por:", opts: ["Restos de Conchas", "Pedras Vulcânicas", "Ouro"], ans: 0 }
            ]
        },
        { 
            title: "São Vicente", loc: "2º Distrito", icon: "🍊", enemy: "🐛", bg: "#2d5a27", gr: "#8b4513",
            quizzes: [
                { q: "Qual fruta deu fama mundial ao distrito?", opts: ["Manga", "Laranja", "Limão"], ans: 1 },
                { q: "São Vicente é conhecido por ser a área...", opts: ["Comercial", "Agrícola", "Industrial"], ans: 1 },
                { q: "A economia histórica baseava-se em:", opts: ["Café", "Citricultura", "Sal"], ans: 1 }
            ]
        },
        { 
            title: "Ciclo do Sal", loc: "Laguna", icon: "🧂", enemy: "⛈️", bg: "#0077be", gr: "#fff",
            quizzes: [
                { q: "Qual a função dos moinhos de vento?", opts: ["Moer Trigo", "Puxar Água Salgada", "Gerar Energia"], ans: 1 },
                { q: "Araruama já foi a maior produtora de...", opts: ["Aço", "Sal", "Tecidos"], ans: 1 },
                { q: "O sal vinha das águas da:", opts: ["Lagoa de Juturnaíba", "Lagoa de Araruama", "Oceano Atlântico"], ans: 1 }
            ]
        }
    ];

    let level = 0, score = 0, timeLeft = 30, gameActive = false, speedMult = 1;
    let player = { x: 0, y: 0 }; 
    let items = [];

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSnd(f, t, d, v=0.2) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    function mudarTab(idx) {
        level = idx;
        for(let i=0; i<3; i++) document.getElementById('t'+i).classList.toggle('active', i === idx);
        document.getElementById('m-icon').innerText = districts[level].icon;
        document.getElementById('m-title').innerText = districts[level].title;
        document.getElementById('m-text').innerText = districts[level].info;
    }

    function showMsg(txt, color) {
        const div = document.getElementById('msg-overlay');
        div.innerText = txt; div.style.color = color; div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 1500);
    }

    function startLevel() {
        initAudio();
        document.getElementById('modal').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('btn-desistir').style.display = 'flex';
        score = 0; items = []; timeLeft = 30; speedMult = 1; gameActive = true;
        updateUI();
        clearInterval(gameTimer);
        gameTimer = setInterval(() => {
            timeLeft--;
            if(timeLeft <= 0) gameOver("TEMPO ESGOTADO!");
            updateUI();
        }, 1000);
        for(let i=0; i<7; i++) spawn(true);
    }

    function spawn(init = false) {
        if (!gameActive && !init) return;
        items.push({ 
            x: Math.random() * (canvas.width - 60) + 30, 
            y: init ? (Math.random() * -canvas.height) : -50, 
            isG: Math.random() > 0.45,
            s: (5 + level * 1.5 + Math.random() * 3) * speedMult
        });
    }

    function gameOver(reason) {
        gameActive = false;
        clearInterval(gameTimer);
        playSnd(100, 'sawtooth', 0.8);
        showMsg(reason, "var(--danger)");
        setTimeout(desistir, 2000);
    }

    function showQuiz() {
        gameActive = false;
        clearInterval(gameTimer);
        const d = districts[level];
        const qData = d.quizzes[Math.floor(Math.random() * d.quizzes.length)];
        
        document.getElementById('q-question').innerText = qData.q;
        const optsDiv = document.getElementById('q-options');
        optsDiv.innerHTML = "";
        
        qData.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = "btn-main";
            b.innerText = o;
            b.onclick = () => {
                if(i === qData.ans) {
                    showMsg("MISSÃO CUMPRIDA!", "var(--success)");
                    playSnd(800, 'sine', 0.5);
                    setTimeout(() => {
                        level = (level + 1) % districts.length;
                        document.getElementById('quiz-modal').style.display = 'none';
                        desistir();
                    }, 2000);
                } else {
                    gameOver("CONHECIMENTO INSUFICIENTE!");
                    document.getElementById('quiz-modal').style.display = 'none';
                }
            };
            optsDiv.appendChild(b);
        });
        document.getElementById('quiz-modal').style.display = 'flex';
    }

    function loop() {
        if(gameActive) {
            const d = districts[level];
            ctx.fillStyle = d.bg; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = d.gr; ctx.fillRect(0, canvas.height*0.85, canvas.width, canvas.height*0.15);
            
            // Jogador
            ctx.fillStyle = "white"; ctx.beginPath(); 
            ctx.arc(player.x, player.y, 25, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "var(--gold)"; ctx.lineWidth = 4; ctx.stroke();

            for(let i = items.length - 1; i >= 0; i--) {
                let it = items[i]; it.y += it.s;
                ctx.font = "42px Arial"; ctx.fillText(it.isG ? d.icon : d.enemy, it.x, it.y);
                
                if(Math.hypot(player.x - it.x, player.y - it.y) < 45) {
                    if(it.isG) { 
                        score++; speedMult += 0.02; playSnd(700, 'sine', 0.1); 
                    } else { 
                        score = Math.max(0, score - 3); playSnd(150, 'sawtooth', 0.3);
                        document.getElementById('damage-overlay').style.display='block'; 
                        setTimeout(()=>document.getElementById('damage-overlay').style.display='none', 100); 
                    }
                    items.splice(i, 1); spawn(); updateUI();
                    if(score >= 10) showQuiz();
                } else if(it.y > canvas.height + 50) { items.splice(i, 1); spawn(); }
            }
        }
        requestAnimationFrame(loop);
    }

    function desistir() {
        gameActive = false;
        clearInterval(gameTimer);
        document.getElementById('ui').style.display = 'none';
        document.getElementById('quiz-modal').style.display = 'none';
        document.getElementById('btn-desistir').style.display = 'none';
        document.getElementById('modal').style.display = 'flex';
        mudarTab(level);
    }

    function updateUI() {
        document.getElementById('txt-target').innerText = score + " / 10";
        const tDisp = document.getElementById('txt-time');
        tDisp.innerText = timeLeft + "s";
        tDisp.className = timeLeft <= 5 ? "val timer-low" : "val";
        document.getElementById('txt-loc').innerText = districts[level].loc;
    }

    const mover = (e) => {
        player.x = e.touches ? e.touches[0].clientX : e.clientX;
        player.y = e.touches ? e.touches[0].clientY : e.clientY;
    };
    window.addEventListener('mousemove', mover);
    window.addEventListener('touchmove', (e) => { mover(e); e.preventDefault(); }, {passive:false});
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    player = { x: canvas.width/2, y: canvas.height/2 };
    mudarTab(0);
    loop();
</script>
</body>
</html>
