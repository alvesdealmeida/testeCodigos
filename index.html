<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Binário: Missão Programação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js?v=2.0.1"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
            --panel-bg: rgba(31, 41, 55, 0.7);
            --accent-green: #00ff66;
            --accent-glow: rgba(0, 255, 102, 0.3);
            --text-main: #f3f4f6;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            text-align: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* RESTRIÇÃO DESKTOP */
        #desktop-block {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0f19;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @media (min-width: 1025px) {
            #desktop-block { display: flex; }
            #main-content { display: none; }
        }

        /* TELAS */
        .screen { display: none; padding: 15px; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .menu-card {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 95%;
            max-width: 500px;
        }

        .mapa-fases {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .fase-btn {
            height: 80px;
            border-radius: 16px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #9ca3af;
        }
        .fase-btn span { font-size: 0.65rem; text-transform: uppercase; margin-top: 4px; }
        .fase-btn.liberada { border-color: var(--accent-green); color: var(--accent-green); box-shadow: 0 0 10px var(--accent-glow); }
        .fase-btn.bloqueada { opacity: 0.4; cursor: not-allowed; }

        /* AJUSTE BOTÃO UPLOAD (MENOR) */
        .btn-upload {
            display: inline-block; 
            width: auto;
            padding: 8px 20px; 
            margin-top: 15px;
            background: rgba(0, 188, 255, 0.1);
            border: 1px solid #00bcff; color: #00bcff;
            border-radius: 20px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
        }

        /* GRID E CELULA */
        .grid { display: grid; gap: 2px; background: rgba(255, 255, 255, 0.05); padding: 5px; border-radius: 8px; }
        .cell {
            aspect-ratio: 1/1;
            background: #1f2937;
            border-radius: 2px;
        }
        .cell.active { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .cell.correct { background: #10b981 !important; }
        .cell.wrong { background: #ef4444 !important; }

        .split-container { display: flex; flex-direction: column; width: 100%; }
        .binary-list { font-family: monospace; color: var(--accent-green); font-size: 1rem; line-height: 1.2; letter-spacing: 2px; margin-bottom: 15px;}
        
        .action-btn { padding: 10px 15px; border-radius: 8px; font-weight: bold; border: none; margin: 5px; font-size: 0.8rem; }
        .btn-success { background: #10b981; color: white; }
    </style>
</head>
<body>

<div id="desktop-block">
    <h1>📱 Use um Celular</h1>
    <p>Este sistema foi otimizado exclusivamente para dispositivos móveis e tablets.</p>
</div>

<div id="main-content">
    <div id="telaMenu" class="screen active">
        <div class="menu-card">
            <h1 style="font-size: 1.8rem;">Pixel Binário</h1>
            <div class="mapa-fases">
                <div id="fase1" class="fase-btn liberada" onclick="jogarFase(0)">1<span>Fácil</span></div>
                <div id="fase2" class="fase-btn bloqueada" onclick="jogarFase(1)">2<span>Médio</span></div>
                <div id="fase3" class="fase-btn bloqueada" onclick="jogarFase(2)">3<span>Difícil</span></div>
            </div>
            <label for="fileInput" class="btn-upload">📁 Enviar Imagem</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <div id="jogoTela" class="screen">
        <div id="statusFase" style="margin-bottom: 10px; color: #00bcff; font-weight: bold;"></div>
        <div class="split-container">
            <div id="binaryDisplay" class="binary-list"></div>
            <div id="gridDisplay" class="grid"></div>
        </div>
        <div style="margin-top: 20px;">
            <button class="action-btn btn-success" onclick="validar()">✔ Compilar</button>
            <button class="action-btn" style="background:#374151; color:white;" onclick="irParaHome()">⬅ Voltar</button>
        </div>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const helperCanvas = document.getElementById('helperCanvas');
    const ctx = helperCanvas.getContext('2d');
    
    let mapaBinario = [];
    let faseAtualIndex = 0;
    let faseDesbloqueada = parseInt(localStorage.getItem('progressoBinario')) || 0;

    const desafios = [
        {
            nome: "Nível 1: Fácil",
            tarefas: [
                ["0110", "1001", "1001", "0110"], // Círculo
                ["1111", "1001", "1001", "1111"], // Quadrado
                ["0110", "0110", "0110", "0110"], // Barra
                ["1001", "0110", "0110", "1001"], // Xis
                ["1111", "0001", "0001", "0001"]  // Letra L
            ]
        },
        {
            nome: "Nível 2: Médio",
            tarefas: [
                ["001100", "011110", "110011", "110011", "011110", "001100"], // Rosto
                ["111111", "100001", "101101", "101101", "100001", "111111"], // Moldura
                ["001000", "011100", "111110", "011100", "001000", "000000"], // Seta
                ["101010", "010101", "101010", "010101", "101010", "010101"]  // Xadrez
            ]
        },
        {
            nome: "Nível 3: Difícil",
            tarefas: [
                ["00011000", "00111100", "01111110", "11011011", "11111111", "00100100", "01011010", "10100101"], // Alien
                ["11111111", "10000001", "10111101", "10100101", "10100101", "10111101", "10000001", "11111111"], // Alvo
                ["00111100", "01000010", "10100101", "10000001", "10100101", "10011001", "01000010", "00111100"], // Ghost
                ["11110000", "11110000", "11110000", "11110000", "00001111", "00001111", "00001111", "00001111"], // Blocos
                ["01010101", "10101010", "01010101", "10101010", "01010101", "10101010", "01010101", "10101010"], // Ruído
                ["00001000", "00011100", "00111110", "01111111", "00011100", "00011100", "00011100", "00011100"]  // Espada
            ]
        }
    ];

    function jogarFase(idx) {
        if (idx > faseDesbloqueada) return alert("Fase Bloqueada!");
        faseAtualIndex = idx;
        const subTarefas = desafios[idx].tarefas;
        mapaBinario = subTarefas[Math.floor(Math.random() * subTarefas.length)];
        document.getElementById('statusFase').textContent = desafios[idx].nome;
        montarJogo(mapaBinario[0].length);
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                // TAMANHO REGRADO PARA CELULAR (Máx 12x12 para não quebrar o layout)
                let size = 12; 
                helperCanvas.width = size; helperCanvas.height = size;
                ctx.drawImage(img, 0, 0, size, size);
                const data = ctx.getImageData(0, 0, size, size).data;
                mapaBinario = [];
                for (let y = 0; y < size; y++) {
                    let linha = "";
                    for (let x = 0; x < size; x++) {
                        const i = (y * size + x) * 4;
                        const lum = (data[i] + data[i+1] + data[i+2]) / 3;
                        linha += (lum < 128 && data[i+3] > 50) ? "1" : "0";
                    }
                    mapaBinario.push(linha);
                }
                document.getElementById('statusFase').textContent = "Imagem Customizada";
                montarJogo(size);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function montarJogo(cols) {
        document.getElementById('telaMenu').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');
        document.getElementById('binaryDisplay').innerHTML = mapaBinario.join('<br>');
        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.style.width = "min(90vw, 400px)";

        mapaBinario.forEach(linha => {
            [...linha].forEach(bit => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.bit = bit;
                cell.onclick = () => cell.classList.toggle('active');
                grid.appendChild(cell);
            });
        });
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains('active');
            if ((is1 && !active) || (!is1 && active)) erro = true;
        });

        if (!erro) {
            alert("Sucesso!");
            if (faseAtualIndex === faseDesbloqueada && faseDesbloqueada < 2) {
                faseDesbloqueada++;
                localStorage.setItem('progressoBinario', faseDesbloqueada);
            }
            irParaHome();
        } else {
            alert("Erro no código!");
        }
    }

    function irParaHome() {
        document.getElementById('jogoTela').classList.remove('active');
        document.getElementById('telaMenu').classList.add('active');
        atualizarMapaVisual();
    }

    function atualizarMapaVisual() {
        for (let i = 1; i <= 3; i++) {
            const btn = document.getElementById(`fase${i}`);
            if (i - 1 <= faseDesbloqueada) {
                btn.classList.replace('bloqueada', 'liberada');
            }
        }
    }

    atualizarMapaVisual();
</script>
</body>
</html>
