<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mostrabot — Primeiros Passos</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --up-color:    #3A8FE8;
      --down-color:  #E8773A;
      --left-color:  #9B59B6;
      --right-color: #27AE60;
      --target-color: #F5C842;
      --robot-color:  #3A8FE8;
      --success-color:#27AE60;
      --error-color:  #E84040;
      --bg:            #FFF8F0;
      --card:          #FFFFFF;
      --border:        #E8E0D8;
      --text:          #1A1A2E;
      --muted:         #7A7A8A;
      --radius:        14px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .app-header {
      background: var(--card);
      border-bottom: 2px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand-title { font-family: 'Fredoka One', cursive; color: var(--robot-color); font-size: 20px; }

    .app-main {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── GRADE E POSICIONAMENTO DO BOTÃO PLAY ── */
    .grid-section { display: flex; flex-direction: column; align-items: center; width: 100%; }

    .layout-container {
      display: flex;
      flex-direction: column;
      align-items: flex-end; /* Alinha o botão à direita da grade */
      gap: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 8px;
      border: 2px solid var(--border);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .cell {
      width: clamp(40px, 13vw, 65px);
      height: clamp(40px, 13vw, 65px);
      border-radius: 8px;
      background: #fff;
      border: 2px solid #D8D0C8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      cursor: pointer;
    }

    .cell.robot-cell { border-color: var(--robot-color); background: #EEF6FF; font-size: 28px; }
    .cell.target-cell { border-color: var(--target-color); background: #FFF9D6; border-width: 3px; }
    .cell.robot-on-target { border-color: var(--target-color); background: #FFFDE6; animation: pulse 0.5s infinite alternate; }

    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

    /* BOTÃO EXECUTAR QUADRADO - AGORA FIXO ABAIXO DA GRADE À DIREITA */
    .btn-exec-mini {
      width: clamp(40px, 13vw, 60px);
      height: clamp(40px, 13vw, 60px);
      border-radius: 12px;
      background: var(--success-color);
      color: white;
      font-size: 24px;
      border: none;
      box-shadow: 0 4px 0 #1A7A42;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 5px; /* Alinhamento visual com a última coluna */
    }

    .btn-exec-mini:active { transform: translateY(2px); box-shadow: 0 2px 0 #1A7A42; }
    .btn-exec-mini:disabled { background: #90C8A0; filter: grayscale(0.6); box-shadow: none; }

    /* ── BOTÕES DE COMANDO EM LINHA ── */
    .cmd-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 5px 0;
    }

    .cmd-btn {
      width: 58px;
      height: 58px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .cmd-btn.left  { background: var(--left-color);  box-shadow: 0 4px 0 #6B2D8A; }
    .cmd-btn.up    { background: var(--up-color);    box-shadow: 0 4px 0 #1A5FAD; }
    .cmd-btn.down  { background: var(--down-color);  box-shadow: 0 4px 0 #AD4E1A; }
    .cmd-btn.right { background: var(--right-color); box-shadow: 0 4px 0 #1A7A42; }

    .cmd-btn:active { transform: translateY(3px); box-shadow: none; }
    .cmd-arrow { font-size: 24px; color: white; }

    /* ── OUTROS ── */
    .panel { background: white; border-radius: var(--radius); padding: 12px; border: 2px solid var(--border); }
    .status-bar { padding: 10px; text-align: center; border-radius: 10px; font-family: 'Fredoka One'; margin-bottom: 5px; border: 2px solid var(--border); }
    .status-bar.success { color: var(--success-color); border-color: var(--success-color); background: #E8FBF0; }
    .status-bar.error { color: var(--error-color); border-color: var(--error-color); background: #FFE8E8; }

    .queue-area { display: flex; flex-wrap: wrap; gap: 5px; background: #F7F4F0; padding: 10px; border-radius: 10px; min-height: 50px; }
    .q-chip { width: 28px; height: 28px; border-radius: 6px; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .q-chip.up { background: var(--up-color); } .q-chip.down { background: var(--down-color); }
    .q-chip.left { background: var(--left-color); } .q-chip.right { background: var(--right-color); }

    #aviso-desktop-somente { display: none !important; }
    @media screen and (min-width: 1025px) and (pointer: fine) {
        #aviso-desktop-somente { display: flex !important; position: fixed; inset: 0; background: #FFF8F0; z-index: 999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .app-header, .app-main { display: none !important; }
    }
  </style>
</head>
<body>

<div id="aviso-desktop-somente">
  <h1>📱 Acesso pelo Celular</h1>
  <p>Abra no seu Celular para jogar!</p>
</div>

<header class="app-header">
  <div class="brand-title">🤖 Mostrabot</div>
  <div style="font-family: 'Fredoka One'; color: var(--muted)">Passo <b id="step-num">—</b></div>
</header>

<main class="app-main">
  <section class="grid-section">
    <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
      <div class="panel" style="padding: 5px 15px; font-weight: 800;">🎯 Destino: <span id="target-letter">?</span></div>
      <button onclick="setRandomTarget()" style="padding: 8px 15px; border-radius: 10px; border:none; background: var(--target-color); font-family:'Fredoka One'; cursor:pointer;">🎲 Sortear</button>
    </div>

    <!-- Container que agrupa a grade e o botão logo abaixo dela à direita -->
    <div class="layout-container">
      <div class="grid" id="grid"></div>
      <button class="btn-exec-mini" id="btn-exec" onclick="executeCommands()">▶</button>
    </div>
    
    <div style="margin-top: 10px; font-size: 11px; color: var(--muted);">🤖 Robô | 🟡 Destino | 👆 Toque na grade</div>
  </section>

  <div class="status-bar" id="status-bar">Escolha o destino e programe!</div>

  <div class="panel">
    <div style="font-family:'Fredoka One'; font-size: 14px; color: var(--muted); margin-bottom: 8px;">🧩 Blocos de Comando</div>
    <div class="cmd-row">
      <button class="cmd-btn left" onclick="addCmd('left')" id="btn-left"><span class="cmd-arrow">⬅️</span></button>
      <button class="cmd-btn up" onclick="addCmd('up')" id="btn-up"><span class="cmd-arrow">⬆️</span></button>
      <button class="cmd-btn down" onclick="addCmd('down')" id="btn-down"><span class="cmd-arrow">⬇️</span></button>
      <button class="cmd-btn right" onclick="addCmd('right')" id="btn-right"><span class="cmd-arrow">➡️</span></button>
    </div>
  </div>

  <div class="panel">
    <div style="font-family:'Fredoka One'; font-size: 14px; color: var(--muted); margin-bottom: 8px;">📋 Sequência</div>
    <div class="queue-area" id="queue"></div>
    <div style="display: flex; gap: 8px; margin-top: 10px;">
      <button onclick="undoCmd()" id="btn-undo" style="flex:1; padding: 8px; border-radius: 8px; border:none; background:#F0E6FF; font-family:'Fredoka One';">↩ Desfazer</button>
      <button onclick="clearCmds()" id="btn-clear" style="flex:1; padding: 8px; border-radius: 8px; border:none; background:#FFE8E8; font-family:'Fredoka One';">🗑 Limpar</button>
    </div>
  </div>

  <button class="btn-reset" onclick="resetAll()" style="width:100%; padding: 12px; border-radius: 12px; border:2px solid var(--border); background:white; font-family:'Fredoka One'; color: var(--muted);">🔄 Reiniciar Tudo</button>
</main>

<script>
// ── SISTEMA DE SOM (PRESERVADO) ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'step') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
        gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'success') {
        [523, 659, 783, 1046].forEach((f, i) => {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = 'triangle'; o.frequency.setValueAtTime(f, now + i * 0.1);
            g.gain.setValueAtTime(0.1, now + i * 0.1); o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.2);
        });
    } else if (type === 'error') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(50, now + 0.4);
        gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.4);
    }
}

// ── LÓGICA DO JOGO (PRESERVADA) ──
const COLS = 6, ROWS = 6;
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
const DIRS = { up: { dr: -1, dc: 0, arrow: '⬆' }, down: { dr: 1, dc: 0, arrow: '⬇' }, left: { dr: 0, dc: -1, arrow: '⬅' }, right: { dr: 0, dc: 1, arrow: '➡' } };

let robot = { row: 0, col: 0 }, target = null, commands = [], executing = false;

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  CHARS.forEach((ch, idx) => {
    const row = Math.floor(idx / COLS), col = idx % COLS;
    const cell = document.createElement('div');
    cell.className = 'cell'; cell.id = `cell-${row}-${col}`;
    cell.textContent = ch;
    cell.onclick = () => onCellClick(row, col);
    grid.appendChild(cell);
  });
}

function onCellClick(row, col) {
  if (executing) return;
  target = { row, col };
  document.getElementById('target-letter').textContent = CHARS[row * COLS + col];
  renderGrid(); updateButtons();
}

function renderGrid() {
  CHARS.forEach((ch, idx) => {
    const row = Math.floor(idx / COLS), col = idx % COLS, cell = document.getElementById(`cell-${row}-${col}`);
    cell.className = 'cell';
    if (robot.row === row && robot.col === col) {
      cell.textContent = '🤖'; cell.classList.add('robot-cell');
      if (target && row === target.row && col === target.col) cell.classList.add('robot-on-target');
    } else {
      cell.textContent = ch;
      if (target && row === target.row && col === target.col) cell.classList.add('target-cell');
    }
  });
}

function addCmd(dir) {
  if (executing || commands.length >= 24) return;
  commands.push(dir); renderQueue(); updateButtons();
}

function renderQueue() {
  const q = document.getElementById('queue');
  q.innerHTML = commands.map(cmd => `<div class="q-chip ${cmd}">${DIRS[cmd].arrow}</div>`).join('');
}

function undoCmd() { commands.pop(); renderQueue(); updateButtons(); }
function clearCmds() { commands = []; renderQueue(); updateButtons(); }

async function executeCommands() {
  if (executing || !target || commands.length === 0) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  executing = true; setControlsDisabled(true);
  let currentPos = { ...robot };

  for (let i = 0; i < commands.length; i++) {
    document.getElementById('step-num').textContent = i + 1;
    const dir = DIRS[commands[i]], nr = currentPos.row + dir.dr, nc = currentPos.col + dir.dc;
    await new Promise(r => setTimeout(r, 400));
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) { playSound('error'); setStatus('error', '💥 Saiu da grade!'); break; }
    playSound('step');
    currentPos = { row: nr, col: nc }; robot = { ...currentPos }; renderGrid();
  }

  if (robot.row === target.row && robot.col === target.col) { playSound('success'); setStatus('success', '🎉 Você conseguiu!'); }
  else { playSound('error'); setStatus('error', '❌ Tente de novo!'); }
  executing = false; setControlsDisabled(false); updateButtons();
}

function resetAll() { robot = { row: 0, col: 0 }; target = null; commands = []; document.getElementById('target-letter').textContent = '?'; document.getElementById('step-num').textContent = '—'; setStatus('neutral', 'Escolha o destino e programe!'); renderGrid(); renderQueue(); updateButtons(); }
function setStatus(t, m) { const s = document.getElementById('status-bar'); s.className = 'status-bar ' + t; s.textContent = m; }
function setControlsDisabled(d) { ['btn-up','btn-down','btn-left','btn-right','btn-undo','btn-clear','btn-exec'].forEach(id => document.getElementById(id).disabled = d); }
function updateButtons() { document.getElementById('btn-exec').disabled = (commands.length === 0 || !target || executing); }
function setRandomTarget() { onCellClick(Math.floor(Math.random()*ROWS), Math.floor(Math.random()*COLS)); }

buildGrid(); renderGrid();
</script>
</body>
</html>
