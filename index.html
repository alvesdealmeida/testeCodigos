<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Binário</title>
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --accent: #00ff66;
            --text: #ffffff;
            --secondary: #888888;
            --error: #ff4444;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* MENU INICIAL */
        .screen { display: none; width: 100%; height: 100vh; padding: 20px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .menu-container { text-align: center; max-width: 400px; }
        h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        
        .mapa-fases { display: flex; gap: 15px; margin: 30px 0; }
        .fase-btn {
            width: 80px; height: 80px; border-radius: 16px;
            background: var(--card); border: 1px solid #222;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .fase-btn span { font-size: 0.65rem; color: var(--secondary); margin-top: 4px; }
        .fase-btn.liberada { border-color: var(--accent); color: var(--accent); }
        .fase-btn.bloqueada { opacity: 0.3; }

        /* TELA DE JOGO */
        .header-jogo {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            max-width: 500px;
        }
        .btn-voltar { 
            background: none; border: 1px solid #333; color: var(--text); 
            padding: 8px 16px; border-radius: 8px; font-size: 0.8rem;
        }
        .info-missao { text-align: right; }
        .nivel-tag { font-size: 0.7rem; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .objeto-nome { font-size: 0.9rem; font-weight: 500; }

        /* AREA DO JOGO */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            flex-grow: 1;
        }

        .binary-box {
            font-family: "SF Mono", "Courier New", monospace;
            background: #0a0a0a;
            padding: 15px;
            border-radius: 12px;
            color: var(--accent);
            font-size: 1rem;
            line-height: 1.3;
            letter-spacing: 4px;
            border: 1px solid #1a1a1a;
        }

        .grid { 
            display: grid; 
            gap: 4px; 
            padding: 10px;
            background: #0a0a0a;
            border-radius: 14px;
            border: 1px solid #1a1a1a;
        }
        .cell { 
            width: 32px; height: 32px; 
            background: #1a1a1a; 
            border-radius: 4px; 
            transition: background 0.1s;
        }
        .cell.active { background: var(--accent); }
        .cell.correct { background: var(--accent); opacity: 0.6; }
        .cell.wrong { background: var(--error); }

        /* CONTROLES ABAIXADOS MAS VISÍVEIS */
        .controls {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 350px;
            margin: 20px 0 40px 0;
        }
        .btn-main {
            flex: 2;
            padding: 18px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            background: var(--text);
            color: var(--bg);
            transition: opacity 0.2s;
        }
        .btn-sec {
            flex: 1;
            padding: 18px;
            border-radius: 14px;
            background: #1a1a1a;
            color: var(--text);
            border: 1px solid #333;
            font-weight: 600;
        }
        .btn-main:active, .btn-sec:active { opacity: 0.7; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="aviso-mobile-apenas">
    <h1>Acesso Mobile</h1>
    <p>Por favor, abra este link no seu smartphone.</p>
</div>

<div id="app-container" style="width: 100%;">
    <!-- MENU -->
    <div id="telaMenu" class="screen active">
        <div class="menu-container">
            <h1>Pixel<br><span style="color:var(--accent)">Binário</span></h1>
            <p style="color:var(--secondary)">Transforme código em arte digital.</p>
            
            <div class="mapa-fases">
                <div id="fase1" class="fase-btn" onclick="jogarNivel(0)">1<span>Fácil</span></div>
                <div id="fase2" class="fase-btn" onclick="jogarNivel(1)">2<span>Médio</span></div>
                <div id="fase3" class="fase-btn" onclick="jogarNivel(2)">3<span>Difícil</span></div>
            </div>

            <label for="fileInput" style="color:var(--accent); font-size: 0.8rem; cursor:pointer; font-weight:600">
                + CARREGAR IMAGEM PRÓPRIA
            </label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <!-- JOGO -->
    <div id="jogoTela" class="screen">
        <div class="header-jogo">
            <button class="btn-voltar" onclick="irParaHome()">Menu</button>
            <div class="info-missao">
                <div id="statusFase" class="nivel-tag">Nível 1</div>
                <div id="nomeObjeto" class="objeto-nome">Círculo</div>
            </div>
        </div>

        <div class="game-area">
            <div id="binaryDisplay" class="binary-box"></div>
            <div id="gridDisplay" class="grid"></div>
            
            <div class="controls">
                <button class="btn-main" onclick="validar()">COMPILAR</button>
                <button class="btn-sec" onclick="limpar()">LIMPAR</button>
            </div>
        </div>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const helperCanvas = document.getElementById('helperCanvas');
    const ctx = helperCanvas.getContext('2d');
    let mapaBinario = [];
    let progresso = parseInt(localStorage.getItem('progressoBinario')) || 0;

    const temas = [
        { bg: "#000000", accent: "#00ff66" }, // Verde Matrix
        { bg: "#000000", accent: "#38bdf8" }, // Azul Cyber
        { bg: "#000000", accent: "#ff3e00" }, // Laranja Neon
        { bg: "#000000", accent: "#a855f7" }  // Roxo Tech
    ];

    const bancosDeDados = [
        { tarefas: [{mapa: ["0110", "1001", "1001", "0110"], nome: "Círculo"}, {mapa: ["1111", "1001", "1001", "1111"], nome: "Quadrado"}] },
        { tarefas: [{mapa: ["011110", "100001", "101101", "101101", "100001", "011110"], nome: "Robô"}] },
        { tarefas: [{mapa: ["00011000", "00111100", "01111110", "11011011", "11111111", "00100100", "01011010", "10100101"], nome: "Invader"}] }
    ];

    function mudarTema() {
        const tema = temas[Math.floor(Math.random() * temas.length)];
        document.documentElement.style.setProperty('--accent', tema.accent);
    }

    function jogarNivel(idx) {
        if (idx > progresso) return;
        mudarTema();
        const tarefasNivel = bancosDeDados[idx].tarefas;
        const sorteio = tarefasNivel[Math.floor(Math.random() * tarefasNivel.length)];
        mapaBinario = sorteio.mapa;
        document.getElementById('statusFase').textContent = `Nível ${idx + 1}`;
        document.getElementById('nomeObjeto').textContent = sorteio.nome;
        montarJogo(mapaBinario[0].length);
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        mudarTema();
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const size = 10;
                helperCanvas.width = size; helperCanvas.height = size;
                ctx.drawImage(img, 0, 0, size, size);
                const data = ctx.getImageData(0, 0, size, size).data;
                mapaBinario = [];
                for (let y = 0; y < size; y++) {
                    let linha = "";
                    for (let x = 0; x < size; x++) {
                        const i = (y * size + x) * 4;
                        const lum = (data[i] + data[i+1] + data[i+2]) / 3;
                        linha += (lum < 128 && data[i+3] > 50) ? "1" : "0";
                    }
                    mapaBinario.push(linha);
                }
                document.getElementById('statusFase').textContent = "Custom";
                document.getElementById('nomeObjeto').textContent = "Imagem Externa";
                montarJogo(size);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function montarJogo(colunas) {
        document.getElementById('telaMenu').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');
        document.getElementById('binaryDisplay').innerHTML = mapaBinario.join('<br>');
        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
        
        mapaBinario.forEach(linha => {
            [...linha].forEach(bit => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.bit = bit;
                cell.onclick = () => cell.classList.toggle('active');
                grid.appendChild(cell);
            });
        });
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains('active');
            if (is1 && active) c.classList.add('correct');
            else if (!is1 && active) { c.classList.add('wrong'); erro = true; }
            else if (is1 && !active) erro = true;
        });

        if (!erro) {
            progresso = Math.min(progresso + 1, 2);
            localStorage.setItem('progressoBinario', progresso);
            setTimeout(() => { alert("✓ Compilado com sucesso!"); irParaHome(); }, 300);
        } else {
            alert("× Erro na compilação. Verifique os bits.");
        }
    }

    function irParaHome() {
        document.getElementById('jogoTela').classList.remove('active');
        document.getElementById('telaMenu').classList.add('active');
        atualizarBotoes();
    }

    function limpar() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active', 'correct', 'wrong'));
    }

    function atualizarBotoes() {
        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`fase${i+1}`);
            btn.className = `fase-btn ${i <= progresso ? 'liberada' : 'bloqueada'}`;
        }
    }

    atualizarBotoes();
</script>
</body>
</html>
