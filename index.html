<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Araruama: Guardião da História</title>
    <style>
        :root { 
            --gold: #f4d03f; 
            --danger: #ff4757; 
            --deep-green: #1b4d3e; 
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* UI Superior */
        #ui { position: absolute; top: 10px; left: 10px; color: white; z-index: 10; pointer-events: none; display: none; }
        #stats { display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 12px; border: 2px solid var(--gold); }
        .label { color: var(--gold); font-size: 0.6rem; display: block; text-transform: uppercase; }
        .val { font-size: 0.9rem; font-weight: bold; }

        /* Botão Desistir (Canto Inferior Direito) */
        #btn-desistir {
            position: absolute; bottom: 20px; right: 20px;
            width: 55px; height: 55px; background: rgba(0,0,0,0.8);
            border: 3px solid var(--danger); border-radius: 50%;
            color: var(--danger); font-size: 1.8rem; display: none;
            align-items: center; justify-content: center; z-index: 100;
            cursor: pointer; box-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
        }

        /* Menu e Abas */
        .modal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: #0f2027; z-index: 200; 
        }
        .card { 
            background: white; width: 90%; max-width: 400px; 
            border-radius: 25px; overflow: hidden; text-align: center; border: 4px solid var(--gold); 
        }
        .card-header { background: var(--deep-green); color: white; padding: 15px; font-weight: bold; }
        .card-body { padding: 20px; }

        .tabs { display: flex; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .tab { 
            padding: 8px 10px; background: #eee; font-size: 0.7rem; 
            cursor: pointer; border-radius: 5px; font-weight: bold;
        }
        .tab.active { background: var(--gold); color: black; }

        .btn-main { 
            background: var(--deep-green); color: white; padding: 15px; border: none; 
            border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer;
        }

        #damage-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.4); display:none; pointer-events:none; z-index:5; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="damage-overlay"></div>
<div id="btn-desistir" onclick="desistir()">🚪</div>

<div id="ui">
    <div id="stats">
        <div><span class="label">LOCAL</span><span id="txt-loc" class="val">-</span></div>
        <div><span class="label">CONHECIMENTO</span><span id="txt-target" class="val">0 / 10</span></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="card">
        <div class="card-header">ARARUAMA: SELETOR DE ERA</div>
        <div class="card-body">
            <div class="tabs">
                <div class="tab active" onclick="mudarTab(0)">CENTRO</div>
                <div class="tab" onclick="mudarTab(1)">S. VICENTE</div>
                <div class="tab" onclick="mudarTab(3)">LAGUNA</div>
            </div>
            <span id="m-icon" style="font-size: 3rem;">🐚</span>
            <h2 id="m-title" style="margin: 10px 0;">Os Sambaquis</h2>
            <p id="m-text" style="font-size: 0.9rem; color: #666; min-height: 60px;"></p>
            <button class="btn-main" onclick="startLevel()">INICIAR EXPEDIÇÃO</button>
        </div>
    </div>
</div>

<div id="quiz-modal" class="modal" style="display:none; background: rgba(0,0,0,0.9);">
    <div class="card">
        <div class="card-header">DESAFIO HISTÓRICO</div>
        <div class="card-body">
            <p id="q-question" style="font-weight:bold;"></p>
            <div id="q-options" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    let level = 0, score = 0, gameActive = false;
    let player = { x: 0, y: 0 }; let items = [];

    const campaign = [
        { title: "Os Sambaquis", loc: "Centro", info: "Explore as origens tupi de Araruama. Colete conchas e evite os caranguejos da orla.", icon: "🐚", enemy: "🦀", bg: "#87CEEB", gr: "#f4d03f", q: "O que significa Araruama?", opts: ["Rio de Janeiro", "Lugar de Conchas", "Terra do Sal"], ans: 1 },
        { title: "São Vicente Rural", loc: "2º Distrito", info: "O coração agrícola! Proteja a colheita de limão e laranja das pragas famintas.", icon: "🍋", enemy: "🐛", bg: "#2d5a27", gr: "#8b4513", q: "São Vicente é conhecido como o polo...", opts: ["Industrial", "Agrícola", "Portuário"], ans: 1 },
        { title: "Estrada de Ferro", loc: "S. Vicente", info: "A antiga ferrovia Maricá. Recupere as cargas de café deixadas nos trilhos.", icon: "☕", enemy: "⚠️", bg: "#4a4a4a", gr: "#333", q: "Como o café saía de São Vicente antigamente?", opts: ["De Trem", "De Avião", "A Cavalo"], ans: 0 },
        { title: "Salina e Moinhos", loc: "Orla", info: "O Ciclo do Sal! Colete os cristais de Ouro Branco e fuja das tempestades.", icon: "🧂", enemy: "⛈️", bg: "#0077be", gr: "#fff", q: "Para que serviam os moinhos de vento?", opts: ["Gerar luz", "Bombear água salgada", "Fazer farinha"], ans: 1 }
    ];

    function mudarTab(idx) {
        level = idx;
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach((t, i) => t.classList.toggle('active', i === (idx > 2 ? 2 : idx)));
        const c = campaign[level];
        document.getElementById('m-icon').innerText = c.icon;
        document.getElementById('m-title').innerText = c.title;
        document.getElementById('m-text').innerText = c.info;
    }

    function startLevel() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('btn-desistir').style.display = 'flex';
        score = 0; items = []; 
        gameActive = true; 
        updateUI();
        for(let i=0; i<10; i++) spawn(true);
    }

    function desistir() {
        gameActive = false;
        document.getElementById('ui').style.display = 'none';
        document.getElementById('btn-desistir').style.display = 'none';
        document.getElementById('modal').style.display = 'flex';
    }

    function spawn(init = false) {
        const c = campaign[level];
        items.push({ 
            x: Math.random() * canvas.width, 
            y: init ? (Math.random() * -canvas.height) : -50, 
            isG: Math.random() > 0.5, 
            s: (3 + level) + Math.random() * 2
        });
    }

    function updateUI() {
        const c = campaign[level];
        document.getElementById('txt-target').innerText = `${score} / 10`;
        document.getElementById('txt-loc').innerText = c.loc;
    }

    function showQuiz() {
        gameActive = false;
        const c = campaign[level];
        document.getElementById('q-question').innerText = c.q;
        const optsDiv = document.getElementById('q-options');
        optsDiv.innerHTML = "";
        c.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.style.padding = "15px"; b.style.borderRadius = "10px"; b.style.fontWeight = "bold";
            b.innerText = o;
            b.onclick = () => {
                if(i === c.ans) {
                    alert("CORRETO!");
                    level = (level + 1) % campaign.length;
                    document.getElementById('quiz-modal').style.display = 'none';
                    desistir();
                } else {
                    alert("ERRO! Tente o nível novamente.");
                    document.getElementById('quiz-modal').style.display = 'none';
                    startLevel();
                }
            };
            optsDiv.appendChild(b);
        });
        document.getElementById('quiz-modal').style.display = 'flex';
    }

    function loop() {
        if(gameActive) {
            const c = campaign[level];
            ctx.fillStyle = c.bg; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = c.gr; ctx.fillRect(0, canvas.height*0.85, canvas.width, canvas.height*0.15);
            
            // Player
            ctx.fillStyle = "white"; ctx.beginPath(); 
            ctx.arc(player.x, player.y, 20, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#f4d03f"; ctx.lineWidth = 3; ctx.stroke();

            items.forEach((it, i) => {
                it.y += it.s;
                if(it.y > canvas.height) { items.splice(i,1); spawn(); }
                ctx.font = "30px Arial"; ctx.textAlign = "center";
                ctx.fillText(it.isG ? c.icon : c.enemy, it.x, it.y);
                
                if(Math.hypot(player.x-it.x, player.y-it.y) < 35) {
                    if(it.isG) score++;
                    else { score = Math.max(0, score-2); document.getElementById('damage-overlay').style.display='block'; setTimeout(()=>document.getElementById('damage-overlay').style.display='none', 100); }
                    items.splice(i,1); spawn(); updateUI();
                    if(score >= 10) showQuiz();
                }
            });
        }
        requestAnimationFrame(loop);
    }

    const mover = (e) => {
        player.x = e.touches ? e.touches[0].clientX : e.clientX;
        player.y = e.touches ? e.touches[0].clientY : e.clientY;
    };
    window.addEventListener('mousemove', mover);
    window.addEventListener('touchmove', (e) => { mover(e); e.preventDefault(); }, {passive:false});
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();
    player = { x: canvas.width/2, y: canvas.height/2 };
    
    mudarTab(0);
    loop();
</script>
</body>
</html>
