<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Araruama: Guardião da História</title>
    <style>
        :root { --gold: #f4d03f; --danger: #ff4757; --deep-green: #1b4d3e; --success: #2ecc71; --sand: #f5e6be; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; touch-action: none; }
        
        /* UI de Jogo */
        #ui { position: absolute; top: 10px; left: 10px; color: white; z-index: 10; pointer-events: none; display: none; font-family: sans-serif; }
        #stats { display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 12px; border: 2px solid var(--gold); }
        .label { color: var(--gold); font-size: 0.6rem; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 1.1rem; font-weight: bold; }

        /* Mensagens de Feedback */
        #msg-overlay { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; font-weight: bold; display: none; z-index: 300;
            text-shadow: 3px 3px 0px #000; pointer-events: none; text-align: center;
        }

        #btn-desistir {
            position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; 
            background: rgba(0,0,0,0.9); border: 3px solid var(--danger); border-radius: 50%;
            color: var(--danger); font-size: 2rem; display: none; align-items: center; 
            justify-content: center; z-index: 100; cursor: pointer;
        }

        /* Menu Principal Estilizado */
        .modal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: radial-gradient(circle, #2c5364, #203a43, #0f2027); z-index: 200; 
        }
        .card { 
            background: var(--sand); width: 88%; max-width: 420px; border-radius: 15px; 
            overflow: hidden; text-align: center; border: 5px double var(--deep-green);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .card-header { background: var(--deep-green); color: var(--gold); padding: 20px; }
        .card-header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 2px; text-transform: uppercase; }
        .card-header p { margin: 5px 0 0; font-size: 0.8rem; font-style: italic; opacity: 0.9; color: white; }
        
        .card-body { padding: 25px; color: var(--deep-green); }

        .tabs { display: flex; gap: 5px; justify-content: center; margin-bottom: 20px; }
        .tab { padding: 8px; background: rgba(0,0,0,0.1); font-size: 0.7rem; cursor: pointer; border-radius: 4px; flex: 1; border: 1px solid rgba(0,0,0,0.1); font-weight: bold; }
        .tab.active { background: var(--deep-green); color: var(--gold); transform: translateY(-2px); }

        .btn-main { 
            background: var(--deep-green); color: var(--gold); padding: 20px; border: none; 
            border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; 
            font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 4px 0px #0d2a22;
        }
        
        #damage-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.4); display:none; pointer-events:none; z-index:5; }
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 300; pointer-events: none; }
    </style>
</head>
<body>

<div id="damage-overlay"></div>
<div id="msg-overlay"></div>
<div id="btn-desistir" onclick="desistir()">🚪</div>

<div id="ui">
    <div id="stats">
        <div><span class="label">MISSÃO</span><span id="txt-loc" class="val">-</span></div>
        <div><span class="label">PONTOS</span><span id="txt-target" class="val">0 / 10</span></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="card">
        <div class="card-header">
            <h1>GUARDIÃO DE ARARUAMA</h1>
            <p>A História em suas mãos</p>
        </div>
        <div class="card-body">
            <div class="tabs">
                <div id="t0" class="tab active" onclick="mudarTab(0)">CENTRO</div>
                <div id="t1" class="tab" onclick="mudarTab(1)">S. VICENTE</div>
                <div id="t2" class="tab" onclick="mudarTab(2)">LAGUNA</div>
            </div>
            <span id="m-icon" style="font-size: 4.5rem; display: block; margin-bottom: 10px;">🐚</span>
            <h2 id="m-title" style="margin: 0 0 10px 0;">Os Sambaquis</h2>
            <p id="m-text" style="font-size: 1rem; margin-bottom: 30px; line-height: 1.5; min-height: 60px;"></p>
            <button class="btn-main" onclick="startLevel()">ASSUMIR POSTO</button>
        </div>
    </div>
</div>

<div id="quiz-modal" class="modal" style="display:none; background: rgba(0,0,0,0.9);">
    <div class="card">
        <div class="card-header"><h1>DESAFIO FINAL</h1></div>
        <div class="card-body">
            <p id="q-question" style="font-weight:bold; font-size: 1.2rem; margin-bottom: 25px;"></p>
            <div id="q-options" style="display:flex; flex-direction:column; gap:15px;"></div>
        </div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let audioCtx;

    const campaign = [
        { title: "Os Sambaquis", loc: "Centro", info: "Recupere as conchas (🐚) e evite os caranguejos (🦀).", icon: "🐚", enemy: "🦀", bg: "#87CEEB", gr: "#f4d03f", q: "O que significa 'Araruama'?", opts: ["Terra do Sal", "Lugar de Conchas", "Rio Azul"], ans: 1 },
        { title: "São Vicente", loc: "2º Distrito", info: "Colha as laranjas (🍊) e afaste as lagartas (🐛).", icon: "🍊", enemy: "🐛", bg: "#2d5a27", gr: "#8b4513", q: "Qual a base histórica de S. Vicente?", opts: ["Indústria", "Citricultura", "Pecuária"], ans: 1 },
        { title: "Ciclo do Sal", loc: "Laguna", info: "Proteja o sal (🧂) das tempestades (⛈️).", icon: "🧂", enemy: "⛈️", bg: "#0077be", gr: "#fff", q: "Para que serviam os moinhos?", opts: ["Moer Trigo", "Bombear Água", "Gerar Vento"], ans: 1 }
    ];

    let level = 0, score = 0, gameActive = false, glow = 0;
    let player = { x: 0, y: 0 }; 
    let items = [];

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSnd(f, t, d, v=0.2) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    function mudarTab(idx) {
        level = idx;
        for(let i=0; i<3; i++) document.getElementById('t'+i).classList.toggle('active', i === idx);
        const c = campaign[level];
        document.getElementById('m-icon').innerText = c.icon;
        document.getElementById('m-title').innerText = c.title;
        document.getElementById('m-text').innerText = c.info;
    }

    function showMsg(txt, color) {
        const div = document.getElementById('msg-overlay');
        div.innerText = txt; div.style.color = color; div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 1500);
    }

    function startLevel() {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('modal').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('btn-desistir').style.display = 'flex';
        score = 0; items = []; gameActive = true;
        updateUI();
        for(let i=0; i<6; i++) spawn(true);
    }

    function spawn(init = false) {
        if (!gameActive && !init) return;
        items.push({ 
            x: Math.random() * (canvas.width - 60) + 30, 
            y: init ? (Math.random() * -canvas.height) : -50, 
            isG: Math.random() > 0.5,
            s: (4 + level) + Math.random() * 2
        });
    }

    function showQuiz() {
        gameActive = false;
        const c = campaign[level];
        document.getElementById('q-question').innerText = c.q;
        const optsDiv = document.getElementById('q-options');
        optsDiv.innerHTML = "";
        c.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = "btn-main";
            b.innerText = o;
            b.onclick = () => {
                if(i === c.ans) {
                    showMsg("CORRETO!", "#2ecc71");
                    lancarConfetes(80);
                    playSnd(800, 'sine', 0.5);
                    setTimeout(() => {
                        level = (level + 1) % campaign.length;
                        document.getElementById('quiz-modal').style.display = 'none';
                        desistir();
                    }, 2000);
                } else {
                    showMsg("ERRADO!", "#ff4757");
                    playSnd(150, 'sawtooth', 0.5);
                    setTimeout(() => {
                        document.getElementById('quiz-modal').style.display = 'none';
                        startLevel();
                    }, 1500);
                }
            };
            optsDiv.appendChild(b);
        });
        document.getElementById('quiz-modal').style.display = 'flex';
    }

    function lancarConfetes(n) {
        for(let i=0; i<n; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top = '-10px';
            c.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
            document.body.appendChild(c);
            c.animate([{top: '-10px'}, {top: '100vh'}], {duration: 2000 + Math.random()*2000});
            setTimeout(() => c.remove(), 3000);
        }
    }

    function loop() {
        if(gameActive) {
            const c = campaign[level];
            ctx.fillStyle = c.bg; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = c.gr; ctx.fillRect(0, canvas.height*0.85, canvas.width, canvas.height*0.15);
            
            ctx.save();
            if(glow > 0) { ctx.shadowBlur = 20; ctx.shadowColor = "white"; glow--; }
            ctx.fillStyle = "white"; ctx.beginPath(); 
            ctx.arc(player.x, player.y, 25, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#f4d03f"; ctx.lineWidth = 4; ctx.stroke();
            ctx.restore();

            for(let i = items.length - 1; i >= 0; i--) {
                let it = items[i]; it.y += it.s;
                ctx.font = "40px Arial"; ctx.textAlign = "center";
                ctx.fillText(it.isG ? c.icon : c.enemy, it.x, it.y);
                
                if(Math.hypot(player.x - it.x, player.y - it.y) < 45) {
                    if(it.isG) { score++; glow = 10; playSnd(600, 'sine', 0.1); }
                    else { 
                        score = Math.max(0, score - 2); playSnd(200, 'sawtooth', 0.2);
                        document.getElementById('damage-overlay').style.display='block'; 
                        setTimeout(()=>document.getElementById('damage-overlay').style.display='none', 100); 
                    }
                    items.splice(i, 1); spawn(); updateUI();
                    if(score >= 10) showQuiz();
                } else if(it.y > canvas.height + 50) { items.splice(i, 1); spawn(); }
            }
        }
        requestAnimationFrame(loop);
    }

    function desistir() {
        gameActive = false;
        document.getElementById('ui').style.display = 'none';
        document.getElementById('btn-desistir').style.display = 'none';
        document.getElementById('modal').style.display = 'flex';
        mudarTab(level);
    }

    function updateUI() {
        document.getElementById('txt-target').innerText = score + " / 10";
        document.getElementById('txt-loc').innerText = campaign[level].loc;
    }

    const mover = (e) => {
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        player.x = cx; player.y = cy;
    };
    window.addEventListener('mousemove', mover);
    window.addEventListener('touchmove', (e) => { mover(e); e.preventDefault(); }, {passive:false});
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    player = { x: canvas.width/2, y: canvas.height/2 };
    mudarTab(0);
    loop();
</script>
</body>
</html>
