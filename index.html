<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Binário: Missão Programação</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --accent-color: #00ff66;
            --panel-bg: rgba(31, 41, 55, 0.7);
            --text-main: #f3f4f6;
        }

        #aviso-mobile-apenas {
            display: none;
            position: fixed;
            inset: 0;
            background: #0b0f19;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        @media screen and (min-width: 1025px) {
            #aviso-mobile-apenas { display: flex; }
            #app-container { display: none; }
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            text-align: center;
            overflow-x: hidden;
            touch-action: manipulation;
            transition: background-color 0.5s ease;
        }

        .screen { display: none; padding: 15px; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; align-items: center; }

        /* HEADER DO JOGO */
        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            padding: 5px;
        }

        .btn-menu {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .status-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .badge-nivel {
            background: var(--accent-color);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .info-objeto {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 5px;
            font-style: italic;
        }

        /* GRID E BINARIO */
        .split-container { display: flex; width: 100%; flex-direction: column; align-items: center; gap: 10px; }
        .binary-list { 
            font-family: 'Courier New', monospace; 
            color: var(--accent-color); 
            font-size: 0.9rem; 
            letter-spacing: 3px; 
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 12px;
            border-left: 3px solid var(--accent-color);
        }

        .grid { display: grid; gap: 4px; background: rgba(255, 255, 255, 0.03); padding: 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .cell { width: 32px; height: 32px; background: rgba(255,255,255,0.08); border-radius: 5px; transition: 0.2s; }
        .cell.active { background: var(--accent-color); box-shadow: 0 0 12px var(--accent-color); }
        .cell.correct { background: #10b981 !important; transform: scale(0.9); }
        .cell.wrong { background: #ef4444 !important; }

        /* BOTÕES PROFISSIONAIS */
        .controls { 
            margin-top: 20px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            width: 100%;
            max-width: 350px;
            padding-bottom: 40px;
        }

        .action-btn { 
            flex: 1;
            padding: 16px; 
            border: none; 
            border-radius: 16px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s active;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            position: relative;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        .btn-compilar {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: 1px solid #34d399;
        }

        .btn-limpar {
            background: linear-gradient(135deg, #4b5563 0%, #1f2937 100%);
            border: 1px solid #6b7280;
        }

        /* MENU INICIAL */
        .menu-card {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 400px;
            margin-top: 15vh;
        }

        .fase-btn {
            width: 75px; height: 75px; border-radius: 18px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1);
            color: #6b7280; font-weight: bold;
        }
        .fase-btn.liberada { border-color: var(--accent-color); color: var(--accent-color); background: rgba(0, 255, 102, 0.05); }
    </style>
</head>
<body>

<div id="aviso-mobile-apenas">
    <h1>📱 Mobile Only</h1>
    <p>Use um celular para a melhor experiência.</p>
</div>

<div id="app-container">
    <div id="telaMenu" class="screen active">
        <div class="menu-card">
            <h1 style="margin-bottom: 5px;">Pixel Binário</h1>
            <p style="font-size: 0.8rem; color: #9ca3af; margin-bottom: 25px;">Decodifique a imagem bit a bit</p>
            <div class="mapa-fases">
                <div id="fase1" class="fase-btn" onclick="jogarNivel(0)">1<span>Fácil</span></div>
                <div id="fase2" class="fase-btn" onclick="jogarNivel(1)">2<span>Médio</span></div>
                <div id="fase3" class="fase-btn" onclick="jogarNivel(2)">3<span>Difícil</span></div>
            </div>
            <label for="fileInput" style="display: block; margin-top: 20px; color: #3b82f6; font-size: 0.8rem; font-weight: bold; cursor: pointer;">📁 CARREGAR IMAGEM PRÓPRIA</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <div id="jogoTela" class="screen">
        <div class="game-header">
            <button class="btn-menu" onclick="irParaHome()">Menu</button>
            <div class="status-container">
                <div id="statusFase" class="badge-nivel">Nível 1</div>
                <div id="nomeObjeto" class="info-objeto">Objetivo: Círculo</div>
            </div>
        </div>
        
        <div class="split-container">
            <div class="pane"><div id="binaryDisplay" class="binary-list"></div></div>
            <div class="pane"><div id="gridDisplay" class="grid"></div></div>
        </div>

        <div class="controls">
            <button class="action-btn btn-compilar" onclick="validar()">Compilar</button>
            <button class="action-btn btn-limpar" onclick="limpar()">Limpar</button>
        </div>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const helperCanvas = document.getElementById('helperCanvas');
    const ctx = helperCanvas.getContext('2d');
    let mapaBinario = [];
    let progresso = parseInt(localStorage.getItem('progressoBinario')) || 0;

    const temas = [
        { bg: "#0f172a", accent: "#38bdf8" }, { bg: "#06150b", accent: "#00ff66" },
        { bg: "#1e1b4b", accent: "#a855f7" }, { bg: "#111827", accent: "#fbbf24" }
    ];

    const bancosDeDados = [
        { 
            tarefas: [
                {mapa: ["0110", "1001", "1001", "0110"], nome: "Círculo"},
                {mapa: ["1111", "1001", "1001", "1111"], nome: "Quadrado"},
                {mapa: ["010", "111", "010"], nome: "Cruz"}
            ] 
        },
        { 
            tarefas: [
                {mapa: ["011110", "100001", "101101", "100001", "101101", "011110"], nome: "Rosto"},
                {mapa: ["001100", "011110", "111111", "111111", "011110", "001100"], nome: "Diamante"}
            ] 
        },
        { 
            tarefas: [
                {mapa: ["00011000", "00111100", "01111110", "11011011", "11111111", "00100100", "01011010", "10100101"], nome: "Alien Space Invader"}
            ] 
        }
    ];

    function mudarTema() {
        const tema = temas[Math.floor(Math.random() * temas.length)];
        document.documentElement.style.setProperty('--bg-color', tema.bg);
        document.documentElement.style.setProperty('--accent-color', tema.accent);
    }

    function jogarNivel(idx) {
        if (idx > progresso) return;
        mudarTema();
        const tarefasNivel = bancosDeDados[idx].tarefas;
        const sorteio = tarefasNivel[Math.floor(Math.random() * tarefasNivel.length)];
        mapaBinario = sorteio.mapa;
        document.getElementById('statusFase').textContent = `Nível ${idx + 1}`;
        document.getElementById('nomeObjeto').textContent = `Objetivo: ${sorteio.nome}`;
        montarJogo(mapaBinario[0].length);
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        mudarTema();
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const size = 10;
                helperCanvas.width = size; helperCanvas.height = size;
                ctx.drawImage(img, 0, 0, size, size);
                const data = ctx.getImageData(0, 0, size, size).data;
                mapaBinario = [];
                for (let y = 0; y < size; y++) {
                    let linha = "";
                    for (let x = 0; x < size; x++) {
                        const i = (y * size + x) * 4;
                        const lum = (data[i] + data[i+1] + data[i+2]) / 3;
                        linha += (lum < 128 && data[i+3] > 50) ? "1" : "0";
                    }
                    mapaBinario.push(linha);
                }
                document.getElementById('statusFase').textContent = "Custom";
                document.getElementById('nomeObjeto').textContent = "Objetivo: Sua Imagem";
                montarJogo(size);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function montarJogo(colunas) {
        document.getElementById('telaMenu').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');
        document.getElementById('binaryDisplay').innerHTML = mapaBinario.join('<br>');
        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
        
        mapaBinario.forEach(linha => {
            [...linha].forEach(bit => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.bit = bit;
                cell.onclick = () => cell.classList.toggle('active');
                grid.appendChild(cell);
            });
        });
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains('active');
            if (is1 && active) c.classList.add('correct');
            else if (!is1 && active) { c.classList.add('wrong'); erro = true; }
            else if (is1 && !active) erro = true;
        });

        if (!erro) {
            alert("🎉 COMPILAÇÃO BEM SUCEDIDA!");
            progresso = Math.min(progresso + 1, 2);
            localStorage.setItem('progressoBinario', progresso);
            irParaHome();
        } else {
            alert("❌ ERRO DE SINTAXE NO PIXEL!");
        }
    }

    function irParaHome() {
        document.getElementById('jogoTela').classList.remove('active');
        document.getElementById('telaMenu').classList.add('active');
        atualizarBotoes();
    }

    function limpar() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active', 'correct', 'wrong'));
    }

    function atualizarBotoes() {
        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`fase${i+1}`);
            btn.className = `fase-btn ${i <= progresso ? 'liberada' : 'bloqueada'}`;
        }
    }

    atualizarBotoes();
</script>
</body>
</html>
