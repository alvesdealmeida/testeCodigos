<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Binário | Matrix Edition</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #00ff66;
            --text: #ffffff;
            --secondary: #555555;
            --error: #ff4444;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden; /* Impede o scroll da página inteira */
        }

        #matrixBg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            opacity: 0.3;
        }

        #app-container {
            position: relative;
            z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active { display: flex; }

        /* HEADER FIXO NO TOPO */
        .header-jogo {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        /* ÁREA CENTRAL (SCROLL INTERNO SE NECESSÁRIO) */
        .game-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centraliza grid e números */
            padding: 10px;
            overflow-y: auto;
        }

        /* NÚMEROS BINÁRIOS */
        .binary-box {
            font-family: 'Courier New', monospace;
            background: rgba(5, 5, 5, 0.8);
            padding: 15px;
            border-radius: 12px;
            color: var(--accent);
            font-size: 1.2rem; /* Aumentado */
            letter-spacing: 8px; /* Aumentado o espaço entre números */
            line-height: 1.6; /* Aumentado o espaço entre linhas */
            border: 1px solid #222;
            margin-bottom: 15px;
            text-align: center;
            width: fit-content;
        }

        /* GRID DE DESENHO */
        .grid { 
            display: grid; 
            gap: 4px; 
            padding: 10px; 
            background: rgba(15, 15, 15, 0.9); 
            border-radius: 12px; 
            border: 1px solid #333;
        }
        .cell { 
            width: 35px; height: 35px; 
            background: rgba(40, 40, 40, 0.5); 
            border-radius: 4px; 
            border: 1px solid #444;
        }
        .cell.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); border-color: #fff; }

        /* RODAPÉ FIXO COM BOTÕES */
        .footer-controls {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid #222;
            display: flex;
            gap: 10px;
        }

        .btn-game {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
        }
        .btn-compilar { background: var(--accent); color: #000; }
        .btn-limpar { background: transparent; color: #fff; border: 1px solid #444; }

        /* ESTILO DO MENU */
        .menu-container { margin: auto; text-align: center; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 20px; border: 1px solid #222; }
        .fase-btn { width: 80px; height: 80px; background: #111; border: 1px solid #333; border-radius: 15px; margin: 5px; color: #fff; cursor: pointer; }
        .fase-btn.liberada { border-color: var(--accent); }
    </style>
</head>
<body>

<canvas id="matrixBg"></canvas>

<div id="app-container">
    <!-- TELA MENU -->
    <div id="telaMenu" class="screen active">
        <div class="menu-container">
            <h1 style="margin:0; letter-spacing:-2px;">PIXEL BINÁRIO</h1>
            <p style="color:var(--secondary); font-size:0.7rem;">MATRIX DECODER SYSTEM</p>
            <div style="margin: 20px 0;">
                <button id="fase1" class="fase-btn" onclick="jogarNivel(0)">01<br><small>Fácil</small></button>
                <button id="fase2" class="fase-btn" onclick="jogarNivel(1)">02<br><small>Médio</small></button>
                <button id="fase3" class="fase-btn" onclick="jogarNivel(2)">03<br><small>Difícil</small></button>
            </div>
            <label for="fileInput" style="color:var(--accent); cursor:pointer; font-size:0.8rem;">[ INJETAR CÓDIGO EXTERNO ]</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <!-- TELA JOGO -->
    <div id="jogoTela" class="screen">
        <div class="header-jogo">
            <button onclick="irParaHome()" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:5px;">SAIR</button>
            <div style="text-align:right">
                <div id="statusFase" style="color:var(--accent); font-weight:bold; font-size:0.7rem;">MÓDULO 01</div>
                <div id="nomeObjeto" style="font-weight:900;">OBJETO</div>
            </div>
        </div>

        <div class="game-content">
            <div id="binaryDisplay" class="binary-box"></div>
            <div id="gridDisplay" class="grid"></div>
        </div>

        <div class="footer-controls">
            <button class="btn-game btn-limpar" onclick="limpar()">Reset</button>
            <button class="btn-game btn-compilar" onclick="validar()">Compilar</button>
        </div>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script>
    /* LÓGICA DA MATRIX AO FUNDO */
    const mCanvas = document.getElementById('matrixBg');
    const mCtx = mCanvas.getContext('2d');
    let drops = [];
    function initMatrix() {
        mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
        drops = Array(Math.floor(mCanvas.width/16)).fill(1);
    }
    function drawMatrix() {
        mCtx.fillStyle = "rgba(0,0,0,0.05)"; mCtx.fillRect(0,0,mCanvas.width,mCanvas.height);
        mCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
        mCtx.font = "15px monospace";
        drops.forEach((y, i) => {
            mCtx.fillText(Math.floor(Math.random()*2), i*16, y*16);
            if(y*16 > mCanvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    initMatrix(); setInterval(drawMatrix, 40);

    /* LÓGICA DO JOGO */
    let mapaBinario = [];
    let nivelAtual = 0;
    let progresso = parseInt(localStorage.getItem('progresso')) || 0;

    function jogarNivel(idx) {
        if(idx > progresso) return;
        nivelAtual = idx;
        const temas = ["#00ff66", "#38bdf8", "#ff3e00"];
        document.documentElement.style.setProperty('--accent', temas[idx]);
        
        // Dados estáticos simplificados para exemplo
        const dados = [
            {m: ["0110", "1111", "1111", "0110"], n: "Cápsula"},
            {m: ["011110", "110011", "110011", "111111", "100001", "011110"], n: "Capacete"},
            {m: ["00111100", "01111110", "11011011", "11111111", "11111111", "11011011", "01000010", "00111100"], n: "Caveira"}
        ];
        
        mapaBinario = dados[idx].m;
        document.getElementById('statusFase').textContent = `MÓDULO 0${idx+1}`;
        document.getElementById('nomeObjeto').textContent = dados[idx].n;
        montarJogo();
    }

    // PROCESSAMENTO DE IMAGEM EXTERNA COM DIFICULDADE
    document.getElementById('fileInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const hCanvas = document.getElementById('helperCanvas');
                const hCtx = hCanvas.getContext('2d');
                
                // Define tamanho baseado no nível selecionado (4x4, 6x6 ou 8x8)
                const tamanhos = [4, 6, 8];
                const size = tamanhos[nivelAtual];
                hCanvas.width = size; hCanvas.height = size;
                
                hCtx.drawImage(img, 0, 0, size, size);
                const pixels = hCtx.getImageData(0, 0, size, size).data;
                mapaBinario = [];

                // Lógica de Dificuldade: Ajusta o limiar de brilho
                // Nível 1: Fácil (Limiar padrão) | Nível 3: Hard (Exige mais brilho, fica mais difícil converter)
                let threshold = 128 + (nivelAtual * 20); 

                for (let y = 0; y < size; y++) {
                    let linha = "";
                    for (let x = 0; x < size; x++) {
                        const i = (y * size + x) * 4;
                        const brilho = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                        linha += (brilho < threshold) ? "1" : "0";
                    }
                    mapaBinario.push(linha);
                }
                document.getElementById('nomeObjeto').textContent = "EXTERNO.EXE";
                montarJogo();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function montarJogo() {
        document.getElementById('telaMenu').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');
        
        // Exibe binários com mais espaço
        document.getElementById('binaryDisplay').innerHTML = mapaBinario.join('<br>');
        
        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        const colunas = mapaBinario[0].length;
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
        
        // Ajusta tamanho da célula para o nível 3 caber (8x8)
        const cellSize = colunas > 6 ? "32px" : "45px";

        mapaBinario.forEach(linha => {
            [...linha].forEach(bit => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.width = cellSize;
                cell.style.height = cellSize;
                cell.dataset.bit = bit;
                cell.onclick = () => cell.classList.toggle('active');
                grid.appendChild(cell);
            });
        });
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains('active');
            if((is1 && !active) || (!is1 && active)) erro = true;
        });

        if(!erro) {
            alert("SISTEMA COMPILADO COM SUCESSO!");
            progresso = Math.min(nivelAtual + 1, 2);
            localStorage.setItem('progresso', progresso);
            irParaHome();
        } else {
            alert("ERRO DE SINTAXE NOS BITS!");
        }
    }

    function irParaHome() {
        document.getElementById('jogoTela').classList.remove('active');
        document.getElementById('telaMenu').classList.add('active');
        // Atualiza visual dos botões do menu
        for(let i=0; i<3; i++) {
            document.getElementById(`fase${i+1}`).className = `fase-btn ${i <= progresso ? 'liberada' : ''}`;
        }
    }

    function limpar() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
    }

    irParaHome();
</script>
</body>
</html>
