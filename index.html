<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Binário | Matrix Edition</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #00ff66;
            --text: #ffffff;
            --secondary: #555555;
            --error: #ff4444;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        #matrixBg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            opacity: 0.25;
        }

        #app-container {
            position: relative;
            z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active { display: flex; }

        /* HEADER */
        .header-jogo {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ÁREA DO JOGO */
        .game-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .binary-box {
            font-family: 'Courier New', monospace;
            background: rgba(10, 10, 10, 0.8);
            padding: 15px;
            border-radius: 12px;
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 8px;
            line-height: 1.4;
            border: 1px solid #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .grid { 
            display: grid; 
            gap: 5px; 
            padding: 12px; 
            background: rgba(20, 20, 20, 0.9); 
            border-radius: 12px; 
            border: 1px solid #444;
        }

        /* Células com tamanho restaurado para conforto visual */
        .cell { 
            width: 38px; height: 38px; 
            background: rgba(60, 60, 60, 0.3); 
            border-radius: 4px; 
            border: 1px solid #555;
        }
        .cell.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); border-color: #fff; }

        /* FOOTER */
        .footer-controls {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid #222;
            display: flex;
            gap: 12px;
        }

        .btn-game {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
        }
        .btn-compilar { background: var(--accent); color: #000; }
        .btn-limpar { background: transparent; color: #fff; border: 1px solid #444; }

        /* MENU PRINCIPAL */
        .menu-container { margin: auto; text-align: center; background: rgba(0,0,0,0.85); padding: 40px 20px; border-radius: 30px; border: 1px solid #222; width: 85%; }
        .fase-btn { width: 85px; height: 85px; background: #0a0a0a; border: 2px solid #222; border-radius: 20px; margin: 8px; color: #fff; cursor: pointer; transition: 0.3s; }
        .fase-btn.liberada { border-color: var(--accent); }
        
        /* LINK DE INJEÇÃO */
        #fileInput { display: none; }
        .upload-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--accent);
            text-decoration: underline;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .upload-link:hover { opacity: 1; }
    </style>
</head>
<body>

<canvas id="matrixBg"></canvas>

<div id="app-container">
    <!-- TELA MENU -->
    <div id="telaMenu" class="screen active">
        <div class="menu-container">
            <h1 style="margin:0; letter-spacing:-2px; font-size: 2.4rem;">PIXEL BINÁRIO</h1>
            <p style="color:var(--secondary); font-size:0.75rem; letter-spacing: 2px; margin-bottom: 30px;">MATRIX DECODER</p>
            
            <div>
                <button id="fase1" class="fase-btn" onclick="jogarNivel(0)">01<br><small>Fácil</small></button>
                <button id="fase2" class="fase-btn" onclick="jogarNivel(1)">02<br><small>Médio</small></button>
                <button id="fase3" class="fase-btn" onclick="jogarNivel(2)">03<br><small>Hard</small></button>
            </div>

            <label for="fileInput" class="upload-link">INJETAR CÓDIGO EXTERNO</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <!-- TELA JOGO -->
    <div id="jogoTela" class="screen">
        <div class="header-jogo">
            <button onclick="irParaHome()" style="background:none; border:1px solid #444; color:#888; padding:8px 15px; border-radius:8px; font-weight: bold;">SAIR</button>
            <div style="text-align:right">
                <div id="statusFase" style="color:var(--accent); font-weight:bold; font-size:0.7rem;">MÓDULO 01</div>
                <div id="nomeObjeto" style="font-weight:900;">OBJETO.EXE</div>
            </div>
        </div>

        <div class="game-content">
            <div id="binaryDisplay" class="binary-box"></div>
            <div id="gridDisplay" class="grid"></div>
        </div>

        <div class="footer-controls">
            <button class="btn-game btn-limpar" onclick="limpar()">Reset</button>
            <button class="btn-game btn-compilar" onclick="validar()">Compilar</button>
        </div>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script>
    const mCanvas = document.getElementById('matrixBg');
    const mCtx = mCanvas.getContext('2d');
    let drops = [];
    function initMatrix() {
        mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
        drops = Array(Math.floor(mCanvas.width/18)).fill(1);
    }
    function drawMatrix() {
        mCtx.fillStyle = "rgba(0,0,0,0.08)"; mCtx.fillRect(0,0,mCanvas.width,mCanvas.height);
        mCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
        mCtx.font = "15px monospace";
        drops.forEach((y, i) => {
            mCtx.fillText(Math.floor(Math.random()*2), i*18, y*18);
            if(y*18 > mCanvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
    }
    initMatrix(); setInterval(drawMatrix, 50);

    let mapaBinario = [];
    let nivelAtual = 0;
    let progresso = parseInt(localStorage.getItem('progresso')) || 0;

    function jogarNivel(idx) {
        if(idx > progresso) return;
        nivelAtual = idx;
        const temas = ["#00ff66", "#38bdf8", "#ff3e00"];
        document.documentElement.style.setProperty('--accent', temas[idx]);
        
        const dados = [
            {m: ["0110", "1111", "1111", "0110"], n: "Bateria"},
            {m: ["011110", "100001", "101101", "101101", "100001", "011110"], n: "Visor"},
            {m: ["00111100", "01111110", "11011011", "11111111", "11111111", "11011011", "01111110", "00111100"], n: "Mainframe"}
        ];
        
        mapaBinario = dados[idx].m;
        document.getElementById('statusFase').textContent = `MÓDULO 0${idx+1}`;
        document.getElementById('nomeObjeto').textContent = dados[idx].n;
        montarJogo();
    }

    document.getElementById('fileInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const hCanvas = document.getElementById('helperCanvas');
                const hCtx = hCanvas.getContext('2d');
                const size = [4, 6, 8][nivelAtual];
                hCanvas.width = size; hCanvas.height = size;
                hCtx.drawImage(img, 0, 0, size, size);
                const pixels = hCtx.getImageData(0, 0, size, size).data;
                mapaBinario = [];
                let threshold = 120 + (nivelAtual * 25); 

                for (let y = 0; y < size; y++) {
                    let linha = "";
                    for (let x = 0; x < size; x++) {
                        const i = (y * size + x) * 4;
                        const avg = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                        linha += (avg < threshold) ? "1" : "0";
                    }
                    mapaBinario.push(linha);
                }
                document.getElementById('nomeObjeto').textContent = "UPLOAD.SYS";
                montarJogo();
                e.target.value = ""; 
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function montarJogo() {
        document.getElementById('telaMenu').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');
        document.getElementById('binaryDisplay').innerHTML = mapaBinario.join('<br>');
        
        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        const colunas = mapaBinario[0].length;
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
        
        mapaBinario.forEach(linha => {
            [...linha].forEach(bit => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.bit = bit;
                cell.onclick = () => cell.classList.toggle('active');
                grid.appendChild(cell);
            });
        });
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains('active');
            if((is1 && !active) || (!is1 && active)) erro = true;
        });

        if(!erro) {
            alert("✓ CÓDIGO COMPILADO!");
            progresso = Math.min(nivelAtual + 1, 2);
            localStorage.setItem('progresso', progresso);
            irParaHome();
        } else {
            alert("× ERRO NA SEQUÊNCIA!");
        }
    }

    function irParaHome() {
        document.getElementById('jogoTela').classList.remove('active');
        document.getElementById('telaMenu').classList.add('active');
        atualizarBotoes();
    }

    function limpar() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
    }

    function atualizarBotoes() {
        for(let i=0; i<3; i++) {
            const b = document.getElementById(`fase${i+1}`);
            b.className = `fase-btn ${i <= progresso ? 'liberada' : ''}`;
            b.style.opacity = i <= progresso ? "1" : "0.3";
        }
    }

    atualizarBotoes();
</script>
</body>
</html>
