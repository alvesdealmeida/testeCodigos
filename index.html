<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Binário | Matrix Edition</title>
    <style>
        :root {
            --bg: #000000;
            --card: rgba(10, 10, 10, 0.85);
            --accent: #00ff66;
            --text: #ffffff;
            --secondary: #555555;
            --error: #ff4444;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #matrixBg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            opacity: 0.35;
        }

        #app-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .screen { display: none; width: 100%; max-width: 450px; padding: 15px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; align-items: center; }

        .menu-container { 
            text-align: center; 
            background: rgba(0, 0, 0, 0.7);
            padding: 25px;
            border-radius: 24px;
            backdrop-filter: blur(5px);
            border: 1px solid #1a1a1a;
            width: 90%;
        }
        
        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; margin: 0; line-height: 1; }
        .subtitle { color: var(--secondary); font-size: 0.75rem; margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }
        
        .mapa-fases { display: flex; gap: 10px; margin: 30px 0; justify-content: center; }
        .fase-btn {
            width: 80px; height: 80px; border-radius: 18px;
            background: var(--card); border: 1px solid #1a1a1a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .fase-btn.liberada { border-color: var(--accent); }
        .fase-btn span { font-size: 0.55rem; font-weight: bold; text-transform: uppercase; margin-top: 5px; opacity: 0.6; }
        .fase-btn.bloqueada { opacity: 0.2; cursor: not-allowed; }

        .header-jogo {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; background: rgba(0, 0, 0, 0.85); padding: 10px; border-radius: 10px;
        }
        .btn-voltar {
            background: none; border: 1px solid #333; color: #888;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.7rem;
        }

        .binary-box {
            font-family: 'Courier New', monospace;
            background: rgba(5, 5, 5, 0.9); padding: 15px; border-radius: 12px;
            color: var(--accent); font-size: 1rem; letter-spacing: 4px;
            border: 1px solid #222; margin-bottom: 15px; width: 100%; box-sizing: border-box;
            text-align: center;
        }

        .grid { 
            display: grid; gap: 4px; padding: 10px; 
            background: rgba(8, 8, 8, 0.9); 
            border-radius: 12px; border: 1px solid #222; 
        }
        /* Células reduzidas para caber no Nível 3 */
        .cell { width: 30px; height: 30px; background: rgba(21, 21, 21, 0.6); border-radius: 4px; cursor: pointer; }
        .cell.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .cell.correct { background: var(--accent); opacity: 0.4; }
        .cell.wrong { background: var(--error); }

        /* CONTROLES OTIMIZADOS */
        .controls { display: flex; gap: 10px; width: 100%; margin-top: 20px; }
        .btn-game {
            padding: 14px; border-radius: 10px; font-weight: 700; font-size: 0.75rem;
            letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: 0.2s;
            flex: 1; outline: none; border: none;
        }
        .btn-compilar {
            background: var(--accent); color: #000;
            box-shadow: 0 3px 0 #008833;
        }
        .btn-compilar:active { transform: translateY(2px); box-shadow: 0 1px 0 #008833; }
        
        .btn-limpar { background: transparent; color: #fff; border: 1px solid #333; backdrop-filter: blur(5px); }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<canvas id="matrixBg"></canvas>

<div id="app-container">
    <!-- MENU -->
    <div id="telaMenu" class="screen active">
        <div class="menu-container">
            <h1>PIXEL<br><span id="dynamicAccent" style="color:var(--accent)">BINÁRIO</span></h1>
            <div class="subtitle">Matrix Decoder System</div>
            
            <div class="mapa-fases">
                <div id="fase1" class="fase-btn" onclick="jogarNivel(0)">01<span>Fácil</span></div>
                <div id="fase2" class="fase-btn" onclick="jogarNivel(1)">02<span>Médio</span></div>
                <div id="fase3" class="fase-btn" onclick="jogarNivel(2)">03<span>Hard</span></div>
            </div>

            <label for="fileInput" style="color:var(--accent); font-size: 0.7rem; cursor:pointer; font-weight:700; opacity: 0.8;">
                [ INJETAR CÓDIGO EXTERNO ]
            </label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <!-- JOGO -->
    <div id="jogoTela" class="screen">
        <div class="header-jogo">
            <button class="btn-voltar" onclick="irParaHome()">← SAIR</button>
            <div style="text-align: right;">
                <div id="statusFase" class="subtitle" style="margin:0; color:var(--accent); font-weight:bold; font-size:0.65rem;">MÓDULO 01</div>
                <div id="nomeObjeto" style="font-size: 0.9rem; font-weight: 700;">AGUARDANDO...</div>
            </div>
        </div>

        <div id="binaryDisplay" class="binary-box"></div>
        <div id="gridDisplay" class="grid"></div>
        
        <div class="controls">
            <button class="btn-game btn-compilar" onclick="validar()">Compilar</button>
            <button class="btn-game btn-limpar" onclick="limpar()">Reset</button>
        </div>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script>
    /* --- EFEITO MATRIX --- */
    const matrixCanvas = document.getElementById('matrixBg');
    const mCtx = matrixCanvas.getContext('2d');
    let drops = [];
    const fontSize = 16;
    const letters = "0101010101";

    function initMatrix() {
        matrixCanvas.width = window.innerWidth;
        matrixCanvas.height = window.innerHeight;
        const columns = matrixCanvas.width / fontSize;
        drops = Array(Math.floor(columns)).fill(1);
    }

    function drawMatrix() {
        mCtx.fillStyle = "rgba(0, 0, 0, 0.05)";
        mCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
        const currentAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent');
        mCtx.fillStyle = currentAccent;
        mCtx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            mCtx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    window.addEventListener('resize', initMatrix);
    initMatrix();
    setInterval(drawMatrix, 33);

    /* --- LÓGICA DO JOGO --- */
    let mapaBinario = [];
    let progresso = parseInt(localStorage.getItem('progressoBinario')) || 0;
    const temas = [{ accent: "#00ff66" }, { accent: "#38bdf8" }, { accent: "#ff3e00" }, { accent: "#a855f7" }];

    const bancosDeDados = [
        { tarefas: [{mapa: ["0110", "1001", "1001", "0110"], nome: "Círculo"}] },
        { tarefas: [{mapa: ["011110", "100001", "101101", "101101", "100001", "011110"], nome: "Robô"}] },
        { tarefas: [{mapa: ["00011000", "00111100", "01111110", "11011011", "11111111", "00100100", "01011010", "10100101"], nome: "Invader"}] }
    ];

    function jogarNivel(idx) {
        if (idx > progresso) return;
        const tema = temas[idx % temas.length];
        document.documentElement.style.setProperty('--accent', tema.accent);
        const tarefasNivel = bancosDeDados[idx].tarefas;
        const sorteio = tarefasNivel[Math.floor(Math.random() * tarefasNivel.length)];
        mapaBinario = sorteio.mapa;
        document.getElementById('statusFase').textContent = `MÓDULO 0${idx + 1}`;
        document.getElementById('nomeObjeto').textContent = sorteio.nome;
        montarJogo(mapaBinario[0].length);
    }

    function montarJogo(colunas) {
        document.getElementById('telaMenu').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');
        document.getElementById('binaryDisplay').innerHTML = mapaBinario.join('<br>');
        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
        
        // Ajuste dinâmico de tamanho para matrizes grandes (Nível 3)
        const cellSize = colunas > 6 ? "28px" : "34px";

        mapaBinario.forEach(linha => {
            [...linha].forEach(bit => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.width = cellSize;
                cell.style.height = cellSize;
                cell.dataset.bit = bit;
                cell.onclick = () => cell.classList.toggle('active');
                grid.appendChild(cell);
            });
        });
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains('active');
            if (is1 && active) c.classList.add('correct');
            else if (!is1 && active) { c.classList.add('wrong'); erro = true; }
            else if (is1 && !active) erro = true;
        });

        if (!erro) {
            progresso = Math.min(progresso + 1, 2);
            localStorage.setItem('progressoBinario', progresso);
            setTimeout(() => { alert("✓ COMPILAÇÃO CONCLUÍDA!"); irParaHome(); }, 300);
        } else {
            alert("× ERRO DE SINTAXE: Verifique os bits.");
        }
    }

    function irParaHome() {
        document.getElementById('jogoTela').classList.remove('active');
        document.getElementById('telaMenu').classList.add('active');
        atualizarBotoes();
    }

    function limpar() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active', 'correct', 'wrong'));
    }

    function atualizarBotoes() {
        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`fase${i+1}`);
            btn.className = `fase-btn ${i <= progresso ? 'liberada' : 'bloqueada'}`;
        }
    }

    atualizarBotoes();
</script>
</body>
</html>
