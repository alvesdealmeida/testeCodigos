<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Binário | Pro Edition</title>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --accent: #00ff66;
            --text: #ffffff;
            --secondary: #444444;
            --error: #ff4444;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ILUSTRAÇÃO BINÁRIA CSS */
        .binary-hero {
            width: 120px;
            height: 60px;
            margin: 0 auto 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            opacity: 0.5;
        }
        .hero-bit {
            width: 20px; height: 20px; border: 1px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: var(--accent); border-radius: 4px;
        }

        /* TELAS */
        .screen { display: none; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; align-items: center; }

        /* MENU */
        .menu-container { text-align: center; margin-top: 10vh; }
        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; margin: 0; line-height: 1; }
        .subtitle { color: var(--secondary); font-size: 0.9rem; margin-top: 10px; letter-spacing: 1px; }
        
        .mapa-fases { display: flex; gap: 12px; margin: 40px 0; justify-content: center; }
        .fase-btn {
            width: 90px; height: 90px; border-radius: 20px;
            background: var(--card); border: 1px solid #1a1a1a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fase-btn.liberada { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 255, 102, 0.1); }
        .fase-btn.liberada:hover { transform: translateY(-5px); background: #0f0f0f; }
        .fase-btn span { font-size: 0.6rem; font-weight: bold; text-transform: uppercase; margin-top: 5px; opacity: 0.6; }
        .fase-btn.bloqueada { opacity: 0.2; cursor: not-allowed; }

        /* HEADER JOGO */
        .header-jogo {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #111;
        }
        .btn-voltar {
            background: none; border: 1px solid #222; color: #888;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.75rem;
        }

        /* GRID E DISPLAY */
        .binary-box {
            font-family: 'Courier New', monospace;
            background: #050505; padding: 20px; border-radius: 15px;
            color: var(--accent); font-size: 1.1rem; letter-spacing: 6px;
            border: 1px solid #111; margin-bottom: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        .grid { display: grid; gap: 5px; padding: 12px; background: #080808; border-radius: 12px; border: 1px solid #151515; }
        .cell { width: 34px; height: 34px; background: #151515; border-radius: 5px; cursor: pointer; }
        .cell.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .cell.correct { background: var(--accent); opacity: 0.5; }
        .cell.wrong { background: var(--error); box-shadow: 0 0 15px var(--error); }

        /* CONTROLES ESTILO PROFISSIONAL */
        .controls {
            display: flex; gap: 15px; width: 100%; margin-top: 30px;
        }
        .btn-game {
            padding: 18px; border-radius: 12px; font-weight: 700; font-size: 0.8rem;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.2s;
            flex: 1; outline: none;
        }
        .btn-compilar {
            background: var(--accent); color: #000; border: none;
            box-shadow: 0 4px 0 #008833;
        }
        .btn-compilar:active { transform: translateY(3px); box-shadow: 0 1px 0 #008833; }
        
        .btn-limpar {
            background: transparent; color: #fff; border: 1px solid #333;
        }
        .btn-limpar:hover { background: #111; border-color: #555; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="app-container" style="width: 100%;">
    <!-- MENU -->
    <div id="telaMenu" class="screen active">
        <div class="menu-container">
            <div class="binary-hero">
                <div class="hero-bit">1</div><div class="hero-bit" style="opacity:0.3">0</div>
                <div class="hero-bit">1</div><div class="hero-bit">1</div>
                <div class="hero-bit" style="opacity:0.3">0</div><div class="hero-bit">1</div>
                <div class="hero-bit">0</div><div class="hero-bit">1</div>
            </div>
            <h1>PIXEL<br><span id="dynamicAccent" style="color:var(--accent)">BINÁRIO</span></h1>
            <div class="subtitle">DECODIFICAÇÃO DE MATRIZ</div>
            
            <div class="mapa-fases">
                <div id="fase1" class="fase-btn" onclick="jogarNivel(0)">01<span>Fácil</span></div>
                <div id="fase2" class="fase-btn" onclick="jogarNivel(1)">02<span>Médio</span></div>
                <div id="fase3" class="fase-btn" onclick="jogarNivel(2)">03<span>Hard</span></div>
            </div>

            <label for="fileInput" style="color:var(--accent); font-size: 0.75rem; cursor:pointer; font-weight:700; letter-spacing: 1px;">
                [ INJETAR CÓDIGO EXTERNO ]
            </label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <!-- JOGO -->
    <div id="jogoTela" class="screen">
        <div class="header-jogo">
            <button class="btn-voltar" onclick="irParaHome()">← SAIR</button>
            <div style="text-align: right;">
                <div id="statusFase" class="subtitle" style="margin:0; color:var(--accent); font-weight:bold">NÍVEL 01</div>
                <div id="nomeObjeto" style="font-size: 1rem; font-weight: 700;">AGUARDANDO...</div>
            </div>
        </div>

        <div id="binaryDisplay" class="binary-box"></div>
        <div id="gridDisplay" class="grid"></div>
        
        <div class="controls">
            <button class="btn-game btn-compilar" onclick="validar()">Executar</button>
            <button class="btn-game btn-limpar" onclick="limpar()">Reset</button>
        </div>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const helperCanvas = document.getElementById('helperCanvas');
    const ctx = helperCanvas.getContext('2d');
    let mapaBinario = [];
    let progresso = parseInt(localStorage.getItem('progressoBinario')) || 0;

    const temas = [
        { accent: "#00ff66" }, { accent: "#38bdf8" }, 
        { accent: "#ff3e00" }, { accent: "#a855f7" }
    ];

    const bancosDeDados = [
        { tarefas: [{mapa: ["0110", "1001", "1001", "0110"], nome: "Círculo"}, {mapa: ["1111", "1001", "1001", "1111"], nome: "Quadrado"}] },
        { tarefas: [{mapa: ["011110", "100001", "101101", "101101", "100001", "011110"], nome: "Robô"}] },
        { tarefas: [{mapa: ["00011000", "00111100", "01111110", "11011011", "11111111", "00100100", "01011010", "10100101"], nome: "Invader"}] }
    ];

    function mudarTema() {
        const tema = temas[Math.floor(Math.random() * temas.length)];
        document.documentElement.style.setProperty('--accent', tema.accent);
    }

    function jogarNivel(idx) {
        if (idx > progresso) return;
        mudarTema();
        const tarefasNivel = bancosDeDados[idx].tarefas;
        const sorteio = tarefasNivel[Math.floor(Math.random() * tarefasNivel.length)];
        mapaBinario = sorteio.mapa;
        document.getElementById('statusFase').textContent = `MÓDULO 0${idx + 1}`;
        document.getElementById('nomeObjeto').textContent = sorteio.nome;
        montarJogo(mapaBinario[0].length);
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        mudarTema();
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const size = 10;
                helperCanvas.width = size; helperCanvas.height = size;
                ctx.drawImage(img, 0, 0, size, size);
                const data = ctx.getImageData(0, 0, size, size).data;
                mapaBinario = [];
                for (let y = 0; y < size; y++) {
                    let linha = "";
                    for (let x = 0; x < size; x++) {
                        const i = (y * size + x) * 4;
                        const lum = (data[i] + data[i+1] + data[i+2]) / 3;
                        linha += (lum < 128 && data[i+3] > 50) ? "1" : "0";
                    }
                    mapaBinario.push(linha);
                }
                document.getElementById('statusFase').textContent = "EXTERNO";
                document.getElementById('nomeObjeto').textContent = "Custom Script";
                montarJogo(size);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function montarJogo(colunas) {
        document.getElementById('telaMenu').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');
        document.getElementById('binaryDisplay').innerHTML = mapaBinario.join('<br>');
        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
        
        mapaBinario.forEach(linha => {
            [...linha].forEach(bit => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.bit = bit;
                cell.onclick = () => cell.classList.toggle('active');
                grid.appendChild(cell);
            });
        });
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains('active');
            if (is1 && active) c.classList.add('correct');
            else if (!is1 && active) { c.classList.add('wrong'); erro = true; }
            else if (is1 && !active) erro = true;
        });

        if (!erro) {
            progresso = Math.min(progresso + 1, 2);
            localStorage.setItem('progressoBinario', progresso);
            setTimeout(() => { alert("✓ SUCESSO: Matriz Validada!"); irParaHome(); }, 300);
        } else {
            alert("× ERRO: Bits inconsistentes detectados.");
        }
    }

    function irParaHome() {
        document.getElementById('jogoTela').classList.remove('active');
        document.getElementById('telaMenu').classList.add('active');
        atualizarBotoes();
    }

    function limpar() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active', 'correct', 'wrong'));
    }

    function atualizarBotoes() {
        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`fase${i+1}`);
            btn.className = `fase-btn ${i <= progresso ? 'liberada' : 'bloqueada'}`;
        }
    }

    atualizarBotoes();
</script>
</body>
</html>
