<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Mostrabot — Primeiros Passos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --up-color:    #3A8FE8;
      --up-light:    #D6EAFC;
      --up-dark:     #1A5FAD;
      --down-color:  #E8773A;
      --down-light:  #FCE8D6;
      --down-dark:   #AD4E1A;
      --left-color:  #9B59B6;
      --left-light:  #EDD9FA;
      --left-dark:   #6B2D8A;
      --right-color: #27AE60;
      --right-light: #D5F5E3;
      --right-dark:  #1A7A42;
      --target-color: #F5C842;
      --target-glow:  rgba(245,200,66,0.4);
      --robot-color:  #3A8FE8;
      --success-color:#27AE60;
      --error-color:  #E84040;
      --bg:            #FFF8F0;
      --card:          #FFFFFF;
      --border:        #E8E0D8;
      --text:          #1A1A2E;
      --muted:         #7A7A8A;
      --grid-cell:     #FFFFFF;
      --grid-border:   #D8D0C8;
      --radius:        14px;
      --shadow:        0 3px 14px rgba(0,0,0,0.09);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 10% 10%, rgba(58,143,232,0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(39,174,96,0.08) 0%, transparent 40%);
      color: var(--text);
      min-height: 100%;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--card);
      border-bottom: 2px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-robot { font-size: 28px; line-height: 1; }
    .brand-text  { line-height: 1.1; }

    .brand-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(16px, 4vw, 22px);
      color: var(--robot-color);
    }

    .brand-sub {
      font-size: clamp(9px, 2vw, 11px);
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header-step {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(13px, 3vw, 16px);
      color: var(--muted);
      text-align: right;
    }

    .header-step b { color: var(--robot-color); }

    .app-main {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (min-width: 700px) {
      .app-main {
        flex-direction: row;
        align-items: flex-start;
        padding: 16px;
        gap: 16px;
      }
    }

    /* ── GRID ── */
    .grid-section {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      width: 100%;
    }

    @media (min-width: 700px) {
      .grid-section { width: clamp(280px, 48%, 460px); }
    }

    /* POSICIONAMENTO DO BOTÃO EXECUTAR SOBRE A GRADE */
    .grid-wrap { 
      position: relative; 
      width: fit-content; 
      display: flex; 
      justify-content: center; 
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: clamp(3px, 1vw, 6px);
      background: var(--card);
      border-radius: var(--radius);
      padding: clamp(6px, 2vw, 12px);
      box-shadow: var(--shadow);
      border: 2px solid var(--border);
      width: 100%;
      max-width: 460px;
    }

    /* NOVO BOTÃO EXECUTAR (ÍCONE EMBAIXO DO 9) */
    .btn-exec-mini {
      position: absolute;
      right: -10px;
      bottom: -65px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--success-color);
      color: white;
      font-size: 32px;
      border: none;
      box-shadow: 0 5px 0 #1A7A42;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      transition: transform 0.1s;
      padding-left: 5px; /* Ajuste óptico do ícone play */
    }

    .btn-exec-mini:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #1A7A42;
    }

    .btn-exec-mini:disabled {
      background: #90C8A0;
      box-shadow: 0 4px 0 #5A9A70;
      filter: grayscale(0.5);
      cursor: not-allowed;
    }

    .cell {
      width:  clamp(36px, calc((min(96vw, 460px) - 36px) / 6), 72px);
      height: clamp(36px, calc((min(96vw, 460px) - 36px) / 6), 72px);
      border-radius: 10px;
      background: var(--grid-cell);
      border: 2px solid var(--grid-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(13px, 3.5vw, 24px);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      user-select: none;
      touch-action: manipulation;
    }

    .cell.target-cell {
      background: #FFF9D6;
      border-color: var(--target-color);
      border-width: 3px;
      box-shadow: 0 0 0 3px var(--target-glow);
      animation: pulse-target 1.8s ease-in-out infinite;
      color: #7a5c00;
    }

    @keyframes pulse-target {
      0%, 100% { box-shadow: 0 0 0 3px rgba(245,200,66,0.4); }
      50%       { box-shadow: 0 0 0 7px rgba(245,200,66,0.1); }
    }

    .cell.robot-cell {
      background: #EEF6FF;
      border-color: var(--robot-color);
      border-width: 3px;
      box-shadow: 0 0 0 3px rgba(58,143,232,0.25);
      font-size: clamp(18px, 5vw, 32px);
    }

    .cell.robot-on-target {
      background: #FFFDE6;
      border-color: var(--target-color);
      border-width: 3px;
      box-shadow: 0 0 0 5px rgba(245,200,66,0.35);
      animation: pulse-win 0.6s ease-in-out infinite alternate;
    }

    /* ── CONTROLS ── */
    .controls-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-top: 10px; /* Espaço para o botão flutuante não bater no card */
    }

    .panel {
      background: var(--card);
      border-radius: var(--radius);
      border: 2px solid var(--border);
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .panel-title {
      font-family: 'Fredoka One', cursive;
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cmd-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* BOTÕES SEM TEXTO - SÓ SETAS */
    .cmd-btn {
      border: none;
      border-radius: 14px;
      height: 70px;
      font-family: 'Fredoka One', cursive;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
    }

    .cmd-btn.up    { background: var(--up-color);    color: #fff; box-shadow: 0 5px 0 var(--up-dark);    grid-column: 1 / -1; }
    .cmd-btn.down  { background: var(--down-color);  color: #fff; box-shadow: 0 5px 0 var(--down-dark);  grid-column: 1 / -1; }
    .cmd-btn.left  { background: var(--left-color);  color: #fff; box-shadow: 0 5px 0 var(--left-dark);  }
    .cmd-btn.right { background: var(--right-color); color: #fff; box-shadow: 0 5px 0 var(--right-dark); }

    .cmd-arrow { font-size: 40px; }

    .queue-area {
      min-height: 64px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      background: #F7F4F0;
      border-radius: 10px;
      padding: 8px;
      border: 1.5px dashed var(--border);
    }

    .q-chip {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 900; color: #fff;
    }
    .q-chip.up { background: var(--up-color); }
    .q-chip.down { background: var(--down-color); }
    .q-chip.left { background: var(--left-color); }
    .q-chip.right { background: var(--right-color); }

    .queue-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn-undo, .btn-clear { flex: 1; border: none; border-radius: 10px; padding: 10px; font-family: 'Fredoka One'; font-size: 13px; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
    .btn-undo { background: #F0E6FF; color: var(--left-dark); }
    .btn-clear { background: #FFE8E8; color: #A02020; }

    .status-bar {
      border-radius: 12px; padding: 10px; font-family: 'Fredoka One'; font-size: 14px; text-align: center;
      background: #F4F4F4; color: var(--muted); border: 2px solid var(--border);
    }
    .status-bar.success { background: #E8FBF0; color: var(--success-color); border-color: var(--success-color); }
    .status-bar.error   { background: #FFE8E8; color: var(--error-color);   border-color: var(--error-color); }

    .btn-reset { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; background: white; color: var(--muted); font-family: 'Fredoka One'; margin-top: 8px; }

    /* AVISO DESKTOP */
    #aviso-desktop-somente { display: none !important; }
    @media screen and (min-width: 1025px) {
      @media (pointer: fine) {
        #aviso-desktop-somente { display: flex !important; position: fixed; inset: 0; background: #FFF8F0; z-index: 999999; flex-direction: column; justify-content: center; align-items: center; }
        .app-header, .app-main { display: none !important; }
      }
    }
  </style>
</head>
<body>

<div id="aviso-desktop-somente">
  <span style="font-size: 80px;">📱</span>
  <h1 style="color: #3A8FE8; font-size: 24px;">Acesso pelo Celular</h1>
  <p style="color: #7A7A8A;">Abra no seu Celular para jogar!</p>
</div>

<header class="app-header">
  <div class="header-brand">
    <span class="brand-robot">🤖</span>
    <div class="brand-text">
      <div class="brand-title">Mostrabot</div>
      <div class="brand-sub">Kit EDUC · Primeiros Passos</div>
    </div>
  </div>
  <div class="header-step" id="step-display">Passo <b id="step-num">—</b></div>
</header>

<div class="confetti-wrap" id="confetti-wrap"></div>

<main class="app-main">
  <section class="grid-section">
    <div class="target-display" style="display: flex; gap: 10px; align-items: center; background: white; padding: 10px; border-radius: 15px; border: 2px solid var(--target-color); margin-bottom: 5px;">
      <span style="font-weight: 800;">🎯 Destino: <span id="target-letter" style="color: #7a5c00; font-size: 20px;">?</span></span>
      <button class="btn-random" onclick="setRandomTarget()" style="background: var(--target-color); border: none; padding: 5px 10px; border-radius: 8px; font-family: 'Fredoka One'; cursor: pointer; box-shadow: 0 3px 0 #c89a00;">🎲 Sortear</button>
    </div>

    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
      <!-- BOTÃO EXECUTAR POSICIONADO AQUI -->
      <button class="btn-exec-mini" id="btn-exec" onclick="executeCommands()" title="Executar Programa">▶</button>
    </div>

    <div class="legend-row" style="margin-top: 50px; display: flex; gap: 10px; font-size: 12px; font-weight: 700;">
       <span>🤖 Mostrabot</span> <span>🟡 Destino</span> <span>👆 Toque na grade</span>
    </div>
  </section>

  <section class="controls-section">
    <div class="status-bar" id="status-bar">Tudo reiniciado! Escolha o destino.</div>

    <div class="panel">
      <div class="panel-title">🧩 Blocos de Comando</div>
      <div class="cmd-grid">
        <button class="cmd-btn up" onclick="addCmd('up')" id="btn-up"><span class="cmd-arrow">⬆️</span></button>
        <button class="cmd-btn left" onclick="addCmd('left')" id="btn-left"><span class="cmd-arrow">⬅️</span></button>
        <button class="cmd-btn right" onclick="addCmd('right')" id="btn-right"><span class="cmd-arrow">➡️</span></button>
        <button class="cmd-btn down" onclick="addCmd('down')" id="btn-down"><span class="cmd-arrow">⬇️</span></button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">📋 Sequência <span id="cmd-count">(0)</span></div>
      <div class="queue-area" id="queue">
        <div id="queue-empty" style="width:100%; text-align:center; color: #aaa; font-size: 12px;">Adicione os blocos!</div>
      </div>
      <div class="queue-actions">
        <button class="btn-undo" onclick="undoCmd()" id="btn-undo">↩ Desfazer</button>
        <button class="btn-clear" onclick="clearCmds()" id="btn-clear">🗑 Limpar</button>
      </div>
    </div>

    <button class="btn-reset" onclick="resetAll()">🔄 Reiniciar Tudo</button>
  </section>
</main>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const COLS = 6, ROWS = 6;
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
const DIRS = { up: { dr: -1, dc: 0, arrow: '⬆' }, down: { dr: 1, dc: 0, arrow: '⬇' }, left: { dr: 0, dc: -1, arrow: '⬅' }, right: { dr: 0, dc: 1, arrow: '➡' } };

let robot = { row: 0, col: 0 }, target = null, commands = [], executing = false, execAbort = false;

function init() { buildGrid(); renderAll(); updateButtons(); }

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  CHARS.forEach((ch, idx) => {
    const row = Math.floor(idx / COLS), col = idx % COLS;
    const cell = document.createElement('div');
    cell.className = 'cell'; cell.id = `cell-${row}-${col}`;
    cell.textContent = ch;
    cell.onclick = () => onCellClick(row, col);
    grid.appendChild(cell);
  });
}

function onCellClick(row, col) {
  if (executing) return;
  target = { row, col };
  document.getElementById('target-letter').textContent = CHARS[row * COLS + col];
  renderGrid(); updateButtons();
}

function renderGrid() {
  CHARS.forEach((ch, idx) => {
    const row = Math.floor(idx / COLS), col = idx % COLS, cell = document.getElementById(`cell-${row}-${col}`);
    cell.className = 'cell';
    if (robot.row === row && robot.col === col) {
        cell.classList.add('robot-cell'); cell.textContent = '🤖';
        if (target && row === target.row && col === target.col) cell.classList.add('robot-on-target');
    } else if (target && row === target.row && col === target.col) {
        cell.classList.add('target-cell'); cell.textContent = ch;
    } else { cell.textContent = ch; }
  });
}

function addCmd(dir) {
  if (executing || commands.length >= 24) return;
  commands.push(dir); renderQueue(); updateButtons();
}

function renderQueue() {
  const q = document.getElementById('queue'), empty = document.getElementById('queue-empty');
  q.querySelectorAll('.q-chip').forEach(c => c.remove());
  if (commands.length === 0) { empty.style.display = 'block'; } else {
    empty.style.display = 'none';
    commands.forEach((cmd, i) => {
      const chip = document.createElement('div');
      chip.className = `q-chip ${cmd}`; chip.textContent = DIRS[cmd].arrow;
      q.appendChild(chip);
    });
  }
  document.getElementById('cmd-count').textContent = `(${commands.length})`;
}

function undoCmd() { commands.pop(); renderQueue(); updateButtons(); }
function clearCmds() { commands = []; renderQueue(); updateButtons(); }

async function executeCommands() {
  if (executing || !target || commands.length === 0) return;
  executing = true; setStatus('neutral', '▶ Executando...');
  setControlsDisabled(true);

  for (let i = 0; i < commands.length; i++) {
    if (execAbort) break;
    const dir = DIRS[commands[i]], nr = robot.row + dir.dr, nc = robot.col + dir.dc;
    await new Promise(r => setTimeout(r, 400));
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) { setStatus('error', '💥 Saiu da grade!'); break; }
    robot = { row: nr, col: nc }; renderGrid();
  }

  if (robot.row === target.row && robot.col === target.col) { setStatus('success', '🎉 Parabéns! Você chegou!'); }
  else { setStatus('error', '❌ Não chegou no destino.'); }
  executing = false; setControlsDisabled(false); updateButtons();
}

function resetAll() { robot = { row: 0, col: 0 }; target = null; commands = []; renderAll(); updateButtons(); setStatus('neutral', 'Reiniciado!'); }
function renderAll() { renderGrid(); renderQueue(); }
function setStatus(t, m) { const s = document.getElementById('status-bar'); s.className = 'status-bar ' + t; s.textContent = m; }
function setControlsDisabled(d) { ['btn-up','btn-down','btn-left','btn-right','btn-undo','btn-clear','btn-exec'].forEach(id => document.getElementById(id).disabled = d); }
function updateButtons() { document.getElementById('btn-exec').disabled = (commands.length === 0 || !target || executing); }
function setRandomTarget() { onCellClick(Math.floor(Math.random()*ROWS), Math.floor(Math.random()*COLS)); }

init();
</script>
</body>
</html>
