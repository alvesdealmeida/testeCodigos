<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Pro - Mobile Exam Edition</title>
    <style>
        :root { 
            --navy: #0f172a; --slate: #64748b; --emerald: #10b981; 
            --bg: #f8fafc; --accent: #3b82f6; --danger: #ef4444; --gold: #f59e0b; 
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; }
        
        body { 
            background: var(--bg); color: var(--navy); font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header e Stats */
        header { 
            background: var(--navy); color: white; padding: 12px; 
            display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
        }
        #stats-bar { 
            display: grid; grid-template-columns: 1fr 1fr; background: white; 
            padding: 10px 15px; border-bottom: 2px solid #e2e8f0; font-weight: 800; font-size: 0.9rem;
        }

        /* Área de Jogo Otimizada para Mobile */
        #game-viewport { 
            position: relative; flex-grow: 1; background: #fff; 
            margin: 10px; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;
        }

        .problem-node { 
            position: absolute; width: 120px; padding: 12px; background: white; 
            border: 2px solid var(--navy); border-radius: 8px; text-align: center;
            font-size: 0.9rem; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background 0.3s, transform 0.1s;
        }

        /* Feedback de Erro (Pedagogia do Erro) */
        .node-error { background: #fee2e2 !important; border-color: var(--danger) !important; color: var(--danger); z-index: 50; }

        /* Área de Input e Numpad */
        #input-display { 
            font-size: 2.2rem; color: var(--navy); height: 60px; 
            display: flex; align-items: center; justify-content: center;
            background: #f1f5f9; border-top: 2px solid #cbd5e1; font-weight: 300;
        }
        
        #numpad { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            background: #cbd5e1; gap: 1px; width: 100%;
        }
        .key { 
            background: white; border: none; padding: 22px; font-size: 1.6rem; 
            color: var(--navy); font-weight: 600; transition: background 0.1s;
        }
        .key:active { background: #e2e8f0; }
        .key-special { background: #f8fafc; color: var(--slate); }

        /* Overlays */
        .full-overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .card { 
            background: white; border-radius: 16px; padding: 25px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center;
        }
        .btn-start {
            width: 100%; padding: 15px; margin-top: 10px; background: var(--navy);
            color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- Tela de Início -->
    <div id="start-screen" class="full-overlay">
        <div class="card">
            <h1 style="margin-top:0">MATH EXAM PRO</h1>
            <p style="color:var(--slate)">Treinamento de Alta Performance</p>
            <button class="btn-start" onclick="init()">INICIAR CERTIFICAÇÃO</button>
            <p style="font-size: 0.7rem; margin-top: 20px; color: #94a3b8">Otimizado para Tablets e Celulares</p>
        </div>
    </div>

    <!-- Tela de Resultado -->
    <div id="end-screen" class="full-overlay" style="display:none">
        <div class="card" id="result-content"></div>
    </div>

    <header>
        <span id="ui-level">NÍVEL 1</span>
        <div id="timer-display">00:00</div>
        <button style="background:none; border:1px solid white; color:white; border-radius:4px" onclick="location.reload()">Sair</button>
    </header>
   
    <div id="stats-bar">
        <div style="color:var(--accent)">PONTOS: <span id="ui-score">0</span></div>
        <div style="text-align:right; color:var(--danger)">ERROS: <span id="ui-errors">0</span>/5</div>
    </div>

    <div id="game-viewport"></div>

    <div id="input-display">_</div>

    <div id="numpad">
        <button class="key" onclick="tap(1)">1</button>
        <button class="key" onclick="tap(2)">2</button>
        <button class="key" onclick="tap(3)">3</button>
        <button class="key" onclick="tap(4)">4</button>
        <button class="key" onclick="tap(5)">5</button>
        <button class="key" onclick="tap(6)">6</button>
        <button class="key" onclick="tap(7)">7</button>
        <button class="key" onclick="tap(8)">8</button>
        <button class="key" onclick="tap(9)">9</button>
        <button class="key key-special" onclick="tap('C')">C</button>
        <button class="key" onclick="tap(0)">0</button>
        <button class="key key-special" onclick="tap('.')">.</button>
    </div>
    
    <script>
        const viewport = document.getElementById('game-viewport');
        const inputDisplay = document.getElementById('input-display');
        let score = 0, errors = 0, level = 1, speed = 0.6;
        let nodes = [], currentInput = "", isLive = false, startTime = 0;

        // Gerador Progressivo de Matemática Avançada
        function generateMath() {
            const difficulty = Math.min(level, 15);
            let text, ans;

            if (difficulty < 3) { // Aritmética básica
                let a = r(10, 50), b = r(10, 30);
                text = `${a} + ${b}`; ans = a + b;
            } else if (difficulty < 7) { // Álgebra 1
                let x = r(2, 10), m = r(2, 5);
                let res = m * x + r(1, 10);
                text = `<small>Ache x:</small><br>${m}x + ${res - (m*x)} = ${res}`;
                ans = x;
            } else { // Geometria e Lógica
                let base = r(5, 12), altura = r(4, 10);
                text = `<small>Área Triâng.</small><br>b:${base} h:${altura}`;
                ans = (base * altura) / 2;
            }
            return { text, ans };
        }

        function init() {
            document.getElementById('start-screen').style.display = 'none';
            isLive = true; startTime = Date.now();
            spawn(); loop();
        }

        function tap(v) {
            if(!isLive) return;
            if(window.navigator.vibrate) window.navigator.vibrate(10); // Feedback háptico

            if(v === 'C') currentInput = "";
            else if(v === '.') { if(!currentInput.includes('.')) currentInput += '.'; }
            else if(currentInput.length < 5) currentInput += v;

            inputDisplay.innerText = currentInput || "_";
            checkMatch();
        }

        function checkMatch() {
            const idx = nodes.findIndex(n => n.ans.toString() === currentInput);
            if(idx !== -1) {
                // Sucesso!
                score += 50 * level;
                document.getElementById('ui-score').innerText = score;
                viewport.removeChild(nodes[idx].el);
                nodes.splice(idx, 1);
                currentInput = "";
                inputDisplay.innerText = "_";
                
                // Evolução de nível
                if(score > level * 500) {
                    level++;
                    speed += 0.15;
                    document.getElementById('ui-level').innerText = `NÍVEL ${level}`;
                }
            }
        }

        function spawn() {
            if(!isLive) return;
            const prob = generateMath();
            const div = document.createElement('div');
            div.className = 'problem-node';
            div.innerHTML = prob.text;
            div.style.left = r(10, viewport.clientWidth - 130) + "px";
            div.style.top = "-80px";
            
            viewport.appendChild(div);
            nodes.push({ el: div, ans: prob.ans, y: -80 });
            
            // Intervalo de spawn diminui com o nível
            setTimeout(spawn, Math.max(1200, 4500 - (level * 350)));
        }

        function loop() {
            if(!isLive) return;
            for(let i = nodes.length - 1; i >= 0; i--) {
                nodes[i].y += speed;
                nodes[i].el.style.top = nodes[i].y + "px";

                // Colisão com a base (Erro)
                if(nodes[i].y > viewport.clientHeight - 20) {
                    handleError(i);
                }
            }
            requestAnimationFrame(loop);
        }

        function handleError(index) {
            errors++;
            document.getElementById('ui-errors').innerText = errors;
            
            // Pedagogia do erro: mostra a resposta antes de remover
            const el = nodes[index].el;
            el.classList.add('node-error');
            el.innerHTML = `RESP: ${nodes[index].ans}`;
            
            nodes.splice(index, 1);
            setTimeout(() => { if(el.parentNode) viewport.removeChild(el); }, 1000);

            if(errors >= 5) conclude();
        }

        function conclude() {
            isLive = false;
            const endScreen = document.getElementById('end-screen');
            const resultContent = document.getElementById('result-content');
            endScreen.style.display = 'flex';
            
            resultContent.innerHTML = `
                <h2>EXAME FINALIZADO</h2>
                <div style="font-size: 2rem; margin: 20px 0">${score}</div>
                <p>Nível Máximo: ${level}</p>
                <button class="btn-start" onclick="location.reload()">TENTAR NOVAMENTE</button>
            `;
        }

        function r(min, max) { return Math.floor(Math.random() * (max - min + 1) + min); }

        // Timer
        setInterval(() => {
            if(isLive) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const s = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
            }
        }, 1000);
    </script>
</body>
</html>
